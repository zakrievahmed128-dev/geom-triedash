<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Geometry Dash - Neon Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100vw;height:100vh;cursor:pointer;touch-action:none}
#fsBtn {
  position: absolute;
  bottom: 8vh;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 28px;
  background: linear-gradient(135deg, rgba(0, 201, 255, 0.25), rgba(0, 255, 135, 0.25));
  border: 2px solid #00c9ff;
  color: #fff;
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 16px;
  font-weight: 800;
  border-radius: 30px;
  cursor: pointer;
  display: none;
  z-index: 100;
  box-shadow: 0 0 20px rgba(0, 201, 255, 0.4);
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.25s ease;
  animation: fsPulse 2s infinite;
}
#fsBtn:hover {
  background: linear-gradient(135deg, rgba(0, 201, 255, 0.45), rgba(0, 255, 135, 0.45));
  box-shadow: 0 0 25px rgba(0, 255, 135, 0.6);
  transform: translateX(-50%) scale(1.05);
}
#fsBtn:active {
  transform: translateX(-50%) scale(0.95);
}
@keyframes fsPulse {
  0% { box-shadow: 0 0 15px rgba(0, 201, 255, 0.4); }
  50% { box-shadow: 0 0 25px rgba(0, 255, 135, 0.7); }
  100% { box-shadow: 0 0 15px rgba(0, 201, 255, 0.4); }
}
#menuMpBtn:hover {
  background: linear-gradient(135deg, rgba(147, 51, 234, 0.55), rgba(219, 39, 119, 0.55)) !important;
  box-shadow: 0 0 30px rgba(217, 70, 239, 0.7) !important;
  transform: scale(1.06) translateX(-47%) !important;
  border-color: #f472b6 !important;
}
#menuMpBtn:active {
  transform: scale(0.96) translateX(-52%) !important;
}
.mp-world-item {
  background: rgba(25, 12, 45, 0.7);
  border: 1.5px solid rgba(0, 201, 255, 0.3);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.2s ease;
}
.mp-world-item:hover {
  border-color: #00c9ff;
  background: rgba(25, 12, 45, 0.95);
  box-shadow: 0 0 12px rgba(0, 201, 255, 0.2);
  transform: translateY(-2px);
}
.mp-join-btn {
  background: #ff0055;
  color: #fff;
  border: none;
  padding: 8px 16px;
  font-weight: 800;
  border-radius: 20px;
  font-size: 11px;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
  transition: all 0.2s;
}
.mp-join-btn:hover {
  background: #ff3377;
  box-shadow: 0 0 15px rgba(255, 0, 85, 0.7);
  transform: scale(1.05);
}
#mpWorldsList::-webkit-scrollbar, #chatHistory::-webkit-scrollbar {
  width: 6px;
}
#mpWorldsList::-webkit-scrollbar-track, #chatHistory::-webkit-scrollbar-track {
  background: rgba(0, 0, 0, 0.1);
}
#mpWorldsList::-webkit-scrollbar-thumb, #chatHistory::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.15);
  border-radius: 3px;
}
#mpWorldsList::-webkit-scrollbar-thumb:hover, #chatHistory::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.3);
}
</style>
<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
</head>
<body>

<script>
const bgMusic=document.getElementById('bgMusic');
bgMusic.volume=0.5;
const deathMusic=document.getElementById('deathMusic');
deathMusic.volume=0.65;
let musicStarted=false;
function startMusic(){
  if(deathMusic){
    deathMusic.pause();
    deathMusic.currentTime=0;
  }
  bgMusic.currentTime=0;
  const p=bgMusic.play();
  if(p&&p.catch)p.catch(()=>{});
}
const fsBtn=document.getElementById('fsBtn');
const fsHandler = e => {
  e.preventDefault();
  e.stopPropagation();
  if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
  else if(document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
  fsBtn.style.display='none';
  
  // Unlocking audio nodes on first user interaction
  const p1 = bgMusic.play();
  if(p1 && p1.then) p1.then(() => bgMusic.pause()).catch(()=>{});
  const p2 = deathMusic.play();
  if(p2 && p2.then) p2.then(() => deathMusic.pause()).catch(()=>{});
};
fsBtn.addEventListener('click', fsHandler);
fsBtn.addEventListener('touchstart', fsHandler, {passive: false});
fsBtn.addEventListener('mousedown', e => e.stopPropagation());

const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let V_W=960,V_H=540,scale=1,offsetX=0,offsetY=0;
let offscreenSpike=null;
function initOffscreenSpike(){
  offscreenSpike=document.createElement('canvas');
  offscreenSpike.width=96;offscreenSpike.height=96;
  const cctx=offscreenSpike.getContext('2d');cctx.translate(48,48);
  cctx.shadowColor='#ff2a6d';cctx.shadowBlur=15;
  const sg=cctx.createLinearGradient(0,-24,0,24);sg.addColorStop(0,'#ff5588');sg.addColorStop(.6,'#ff2a6d');sg.addColorStop(1,'#aa0033');cctx.fillStyle=sg;
  cctx.beginPath();cctx.moveTo(0,-20);cctx.lineTo(20,24);cctx.lineTo(-20,24);cctx.closePath();cctx.fill();
  cctx.strokeStyle='rgba(255,255,255,0.7)';cctx.lineWidth=1.5;cctx.stroke();
  cctx.shadowBlur=0;
  cctx.strokeStyle='#000';cctx.lineWidth=2;cctx.lineCap='round';
  cctx.beginPath();cctx.moveTo(-5,-7);cctx.quadraticCurveTo(0,-4,5,-7);cctx.moveTo(-4,-4);cctx.quadraticCurveTo(0,-1,4,-4);cctx.stroke();
  cctx.fillStyle='#fff';cctx.strokeStyle='#000';cctx.lineWidth=1.5;cctx.lineJoin='miter';
  cctx.beginPath();cctx.moveTo(-15,-12);cctx.lineTo(-2,-6);cctx.lineTo(-3,-9);cctx.lineTo(-14,-15);cctx.closePath();cctx.fill();cctx.stroke();
  cctx.beginPath();cctx.moveTo(15,-12);cctx.lineTo(2,-6);cctx.lineTo(3,-9);cctx.lineTo(14,-15);cctx.closePath();cctx.fill();cctx.stroke();
  cctx.fillStyle='#100003';
  cctx.beginPath();cctx.moveTo(-12,-4);cctx.lineTo(-2,-3);cctx.lineTo(-6,3);cctx.closePath();cctx.moveTo(12,-4);cctx.lineTo(2,-3);cctx.lineTo(6,3);cctx.closePath();cctx.fill();
  cctx.fillStyle='#ff1a1a';cctx.save();cctx.shadowColor='#ff0000';cctx.shadowBlur=8;
  cctx.beginPath();cctx.arc(-7,0,2.5,0,6.28);cctx.arc(7,0,2.5,0,6.28);cctx.fill();cctx.restore();
  cctx.fillStyle='#fff';cctx.fillRect(-7.5,-2,1,4);cctx.fillRect(6.5,-2,1,4);
  cctx.fillStyle='#1c0205';cctx.strokeStyle='#000';cctx.lineWidth=1.5;
  cctx.beginPath();cctx.moveTo(-10,6);cctx.quadraticCurveTo(0,2,10,6);cctx.quadraticCurveTo(8,17,0,17);cctx.quadraticCurveTo(-8,17,-10,6);cctx.closePath();cctx.fill();cctx.stroke();
  cctx.fillStyle='#ff4d6d';cctx.beginPath();cctx.arc(0,15,4,0,3.14,true);cctx.fill();
  cctx.fillStyle='#fff';
  cctx.beginPath();cctx.moveTo(-8,6);cctx.lineTo(-5,6);cctx.lineTo(-7,10);cctx.closePath();cctx.fill();
  cctx.beginPath();cctx.moveTo(5,6);cctx.lineTo(8,6);cctx.lineTo(7,10);cctx.closePath();cctx.fill();
  cctx.beginPath();cctx.moveTo(-5,16);cctx.lineTo(-3,13);cctx.lineTo(-2,16);cctx.closePath();cctx.fill();
  cctx.beginPath();cctx.moveTo(2,16);cctx.lineTo(3,13);cctx.lineTo(5,16);cctx.closePath();cctx.fill();
}
initOffscreenSpike();
function resize(){
  const d=Math.min(window.devicePixelRatio||1,2);
  const screenW=window.innerWidth,screenH=window.innerHeight;
  canvas.width=screenW*d;canvas.height=screenH*d;
  ctx.setTransform(d,0,0,d,0,0);
  if(screenW>=960&&screenH>=540){
    // Desktop: native 1:1, no scaling
    V_W=screenW;V_H=screenH;scale=1;offsetX=0;offsetY=0;
  }else{
    // Small screen: scale down to fit, same game world
    const screenAspect=screenW/screenH;
    const gameAspect=960/540;
    if(screenAspect>=gameAspect){
      // Landscape phone: fit by height
      scale=screenH/540;
      V_H=540;V_W=screenW/scale;offsetX=0;offsetY=0;
    }else{
      // Portrait / narrow: fit by width, letterbox vertically
      scale=screenW/960;
      V_W=960;V_H=540;offsetX=0;offsetY=(screenH-V_H*scale)/2;
    }
  }
}
resize();addEventListener('resize',resize);
let W=()=>V_W,H=()=>V_H;

const mobCaches = { bgGradients: {}, nebulas: {}, groundPattern: null, block: null, gridStyles: {} };
function getMobNebula(c) {
    if(!mobCaches.nebulas[c]) {
        const can = document.createElement('canvas');
        can.width=500; can.height=500;
        const cx = can.getContext('2d', {alpha: true});
        const ng=cx.createRadialGradient(250,250,0,250,250,250);
        ng.addColorStop(0, c+'1)'); ng.addColorStop(1, c+'0)');
        cx.fillStyle=ng; cx.fillRect(0,0,500,500);
        mobCaches.nebulas[c] = can;
    }
    return mobCaches.nebulas[c];
}
function getMobGroundPattern() {
    if(!mobCaches.groundPattern) {
        const can = document.createElement('canvas');
        can.width = 48*2; can.height = 48*2; // TILE=48, half=24, but logic uses ts=TILE/2
        const cx = can.getContext('2d', {alpha: false});
        cx.fillStyle = 'rgba(26,10,58,.95)';
        cx.fillRect(0,0,24,24); cx.fillRect(24,24,24,24);
        cx.fillStyle = 'rgba(34,14,74,.95)';
        cx.fillRect(24,0,24,24); cx.fillRect(0,24,24,24);
        mobCaches.groundPattern = document.getElementById('c').getContext('2d').createPattern(can, 'repeat');
    }
    return mobCaches.groundPattern;
}
function getMobBlock() {
    if(!mobCaches.block) {
        const can = document.createElement('canvas');
        can.width = 48+16; can.height = 48+16; // TILE=48 + padding 8
        const cx = can.getContext('2d', {alpha: true});
        const bg=cx.createLinearGradient(8,8,8+48,8+48);
        bg.addColorStop(0,'#3d22a0');bg.addColorStop(1,'#1e0d52');
        cx.fillStyle=bg;cx.fillRect(8,8,48,48);
        cx.shadowColor='#7b4fff';cx.shadowBlur=11; // static max blur
        cx.strokeStyle='#7b4fff';cx.lineWidth=1.5;
        cx.strokeRect(8.5,8.5,47,47);
        mobCaches.block = can;
    }
    return mobCaches.block;
}

function getMobSpike(isCeil) {
    const key = isCeil ? 'spikeCeil' : 'spikeFloor';
    if(!mobCaches[key]) {
        const can = document.createElement('canvas');
        can.width = 48+30; can.height = 48+30; 
        const cx = can.getContext('2d', {alpha: true});
        cx.translate(15,15);
        cx.shadowColor='#ff2a6d';cx.shadowBlur=12;
        const sg=cx.createLinearGradient(0,0,0,48);
        sg.addColorStop(0,'#ff5588');sg.addColorStop(.6,'#ff2a6d');sg.addColorStop(1,'#aa0033');
        cx.fillStyle=sg;
        cx.beginPath();
        if(isCeil){cx.moveTo(24,44);cx.lineTo(44,0);cx.lineTo(4,0);}
        else{cx.moveTo(24,4);cx.lineTo(44,48);cx.lineTo(4,48);}
        cx.closePath();cx.fill();

// === UPDATE ===
function update(dt){
  if (state === 'multiplayerSandbox') {
    updateSandbox(dt);
    return;
  }
  if(state==='win'){gTime+=dt;winT+=dt;if(Math.random()<dt*3)spFW(Math.random()*W(),Math.random()*H()*.6);updPart(dt);return;}
  
  if(state==='introCinematic'){
    gTime+=dt;
    introCinematicTimer+=dt;
    
    // Update cdParts (used for compiling sparks and binary suction)
    for(let i=cdParts.length-1;i>=0;i--){
      const p=cdParts[i];
      p.x+=p.vx*dt;
      p.y+=p.vy*dt;
      p.vy+=p.grav*dt;
      p.l-=dt;
      p.a=Math.max(0,Math.min(1,p.l*2));
      p.rot+=p.vr*dt;
      p.vx*=.99;
      if(p.l<=0)cdParts.splice(i,1);
    }
    
    const t = introCinematicTimer;
    
    // Smooth cinematic black bars sliding in and out
    if (t < introCinematicDuration - 0.6) {
      introWidescreenPercent += (1.0 - introWidescreenPercent) * 6 * dt;
    } else {
      introWidescreenPercent += (0.0 - introWidescreenPercent) * 7 * dt;
    }
    
    // Widescreen alert sound effect or music volume dampening
    if (bgMusic) {
      if (t < 4.4) {
        bgMusic.volume = 0.12; // muffled movie-intro style
      } else {
        bgMusic.volume += (0.5 - bgMusic.volume) * 3.5 * dt; // punch back to full volume!
      }
    }
    
    // Camera transitions timeline
    if (t < 1.0) {
      // Phase 1: Low grid sweep zoom & tilt
      introCam.zoom = 1.0 + t * 0.40;
      introCam.tilt = Math.sin(t * Math.PI) * 0.05;
      introCam.yOffset = -40 * t;
      introCam.xOffset = 180 * t;
    } else if (t < 2.8) {
      // Phase 2: Diagonal diagnostics pan
      const p = (t - 1.0) / 1.8;
      introCam.zoom = 1.40 - p * 0.25;
      introCam.tilt = 0.05 * (1 - p);
      introCam.yOffset = -40 + 15 * p;
      introCam.xOffset = 180 - 120 * p;
    } else if (t < 4.4) {
      // Phase 3: Player compilation in the sky and acceleration drop
      const p = (t - 2.8) / 1.6;
      introCam.zoom = 1.15 + Math.sin(p * Math.PI) * 0.15;
      introCam.tilt = Math.sin(p * Math.PI * 2) * 0.015;
      introCam.yOffset = 0;
      introCam.xOffset = 0;
      
      // Animate player y position (floating in sky, then dropping)
      if (t < 4.0) {
        // Floating compilation
        P.y = CEILING_Y + 40 + Math.sin(gTime * 5) * 6;
      } else {
        // Accelerating fall down to ground
        const fallPct = (t - 4.0) / 0.4;
        const targetY = groundY() - P.h;
        P.y = (CEILING_Y + 40) + (fallPct * fallPct) * (targetY - (CEILING_Y + 40));
        P.rot += dt * 380; // spin quickly during fall!
      }
    } else if (t < 5.2) {
      // Phase 4: Landing shockwave slam!
      if (!introLandingTriggered) {
        introLandingTriggered = true;
        tShake(38);
        tFlash('#ffffff', 0.65);
        const landX = P.x - camX + P.w/2;
        addScreenShockwave(landX, groundY() - 21, '#00ffff');
        addScreenShockwave(landX, groundY() - 21, '#ff0055');
        // Spawn massive explosion landing sparkles
        for (let i = 0; i < 45; i++) {
          const a = Math.random() * 6.28;
          const sp = 160 + Math.random() * 380;
          const fx = fxPool.get();
          fx.x = landX;
          fx.y = groundY() - 21;
          fx.vx = Math.cos(a) * sp;
          fx.vy = Math.sin(a) * sp - 60;
          fx.s = 2.0 + Math.random() * 4.5;
          fx.a = 1.0;
          fx.l = 0.5 + Math.random() * 0.6;
          fx.c = Math.random() < 0.5 ? '#ff0055' : '#00ffff';
        }
      }
      
      // Make P perfectly flat on ground
      P.y = groundY() - P.h;
      P.rot = 0; P.tRot = 0;
      
      const p = (t - 4.4) / 0.8;
      introCam.zoom = 1.30 - p * 0.30;
      introCam.yOffset = 0;
      introCam.xOffset = 0;
    } else {
      // Phase 5: Smooth snap back to standard gameplay camera
      introCam.zoom = 1.0;
      introCam.yOffset = 0;
      introCam.xOffset = 0;
    }
    
    // Handoff to main gameplay countdown directly at '3'
    if (t >= introCinematicDuration) {
      state = 'countdown';
      cdTimer = 0.8; // Skip the "NEON RUSH" reveal since we just did an epic one!
      cdParts = [];
      cdBeats = {n3:false,n2:false,n1:false,go:false};
      introWidescreenPercent = 0;
      introCam = { zoom: 1.0, yOffset: 0, xOffset: 0, tilt: 0 };
      
      // Reset player position for standard start
      P.x = 100;
      P.y = groundY() - P.h;
      P.vy = 0;
      P.rot = 0;
      P.tRot = 0;
      camX = 0;
    }
    
    updPart(dt);
    return;
  }

  if(state==='countdown'){gTime+=dt;cdTimer+=dt;
    for(let i=cdParts.length-1;i>=0;i--){const p=cdParts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.grav*dt;p.l-=dt;p.a=Math.max(0,Math.min(1,p.l*2));p.rot+=p.vr*dt;p.vx*=.99;if(p.l<=0)cdParts.splice(i,1);}
    if(cdParts.length>600)cdParts.splice(0,cdParts.length-600);
    if(cdTimer>=0.8&&!cdBeats.n3){cdBeats.n3=true;tShake(22);tFlash('#00ff87',.3);spCDBurst(W()/2,H()/2,80,['#00ff87','#00c9ff','#fff','#88ffcc'],200,600,1.2);spCDRing(W()/2,H()/2,24,10,'#00ff87',0.8);spCDSpiral(W()/2,H()/2,20,'#00ff87',0.9);}
    if(cdTimer>=1.5&&!cdBeats.n2){cdBeats.n2=true;tShake(28);tFlash('#00c9ff',.35);spCDBurst(W()/2,H()/2,100,['#00c9ff','#0088ff','#fff','#44ddff'],220,650,1.2);spCDRing(W()/2,H()/2,30,10,'#00c9ff',0.8);spCDSpiral(W()/2,H()/2,25,'#00c9ff',0.9);}
    if(cdTimer>=2.1&&!cdBeats.n1){cdBeats.n1=true;tShake(32);tFlash('#ffd700',.4);spCDBurst(W()/2,H()/2,120,['#ffd700','#ff8800','#fff','#ffee88'],250,700,1.3);spCDRing(W()/2,H()/2,36,10,'#ffd700',0.9);spCDSpiral(W()/2,H()/2,30,'#ffd700',1.0);}
    if(cdTimer>=2.5&&!cdBeats.go){cdBeats.go=true;tShake(40);tFlash('#00ff87',.55);spCDBurst(W()/2,H()/2,180,['#00ff87','#00c9ff','#ffd700','#ff2a6d','#fff','#7b4fff'],300,900,1.5);spCDRing(W()/2,H()/2,48,15,'#fff',1.0);spCDRing(W()/2,H()/2,36,60,'#00ff87',0.8);spCDSpiral(W()/2,H()/2,40,'#ffd700',1.1);for(let i=0;i<4;i++)addScreenShockwave(W()/2,H()/2,['#00ff87','#00c9ff','#ffd700','#ff2a6d'][i]);}
    if(cdTimer>=2.8){state='play';speedMult=1;attempts=1;tFlash('#fff',.6);curSec=-1;cdParts=[];cdBeats={n3:false,n2:false,n1:false,go:false};}
    updPart(dt);return;}
  if(state!=='play'){gTime+=dt;updPart(dt);return;}
  if(dt>.04)dt=.04;
  
  // Update screen shockwaves
  for (let i = screenShockwaves.length - 1; i >= 0; i--) {
    const sw = screenShockwaves[i];
    sw.r += dt * 950;
    sw.a -= dt * 2.2;
    if (sw.a <= 0) screenShockwaves.splice(i, 1);
  }

  // Update time echoes
  if (timeWarpTimer > 0 || speedMult > 1.2) {
    if (Math.random() < 0.45) {
      timeEchoes.push({
        x: P.x,
        y: P.y,
        rot: P.rot,
        mode: gameMode,
        sq: P.sq,
        st: P.st,
        grav: gravFlip,
        a: 1.0
      });
    }
  }
  for (let i = timeEchoes.length - 1; i >= 0; i--) {
    const echo = timeEchoes[i];
    echo.a -= dt * (timeWarpTimer > 0 ? 1.4 : 3.0);
    if (echo.a <= 0) timeEchoes.splice(i, 1);
  }
  
  // Matrix Time-Warp speed handling
  if(timeWarpTimer > 0) {
    timeWarpTimer -= dt;
    speedMult = 0.22; // cinematic slow motion
    if(timeWarpTimer <= 0) {
      speedMult = 1.45; // epic turbo boost snap back!
      tFlash('#00ffaa', 0.3);
      tShake(15);
      // Spawn green/cyan digital shockwave particles
      spFX(P.x - camX + P.w/2, P.y + P.h/2, ['#00ff87', '#fff', '#00c9ff'], 25, 80, 240, 0.5);
      addScreenShockwave(P.x - camX + P.w/2, P.y + P.h/2, '#00ffaa');
    }
  }

  // === CYBER-CAT BOSS CINEMATIC ENTRANCE SYSTEM ===
  if (P.x >= 442 * TILE && bossCinematic.state === 'inactive') {
    bossCinematic.state = 'intro';
    bossCinematic.timer = 0;
    bossCinematic.widescreenPercent = 0;
    tFlash('#00ffff', 0.45);
    tShake(18);
  }

  let inCinematic = (bossCinematic.state !== 'inactive' && bossCinematic.state !== 'complete');
  if (inCinematic) {
    bossCinematic.timer += dt;
    
    // Smooth cinematic black widescreen bars sliding in
    if (bossCinematic.timer < 3.4) {
      bossCinematic.widescreenPercent += (1.0 - bossCinematic.widescreenPercent) * 7.5 * dt;
    } else {
      bossCinematic.widescreenPercent += (0.0 - bossCinematic.widescreenPercent) * 7 * dt;
    }
    
    // Handle Cinematic Substates
    if (bossCinematic.timer < 0.8) {
      bossCinematic.state = 'intro';
      speedMult = 0.02;
      bossCam.zoom += (1.35 - bossCam.zoom) * 5 * dt;
      bossCam.yOffset += (0 - bossCam.yOffset) * 5 * dt;
      if (bgMusic) bgMusic.volume = Math.max(0.08, 0.5 * (1.0 - bossCinematic.timer / 0.8));
      if (Math.random() < 0.12) tShake(3);
    } else if (bossCinematic.timer >= 0.8 && bossCinematic.timer < 2.4) {
      bossCinematic.state = 'drawing';
      speedMult = 0.0;
      bossCam.zoom += (1.15 - bossCam.zoom) * 4 * dt;
      bossCam.yOffset += (-85 - bossCam.yOffset) * 4 * dt;
      if (bgMusic) bgMusic.volume = 0.08;
      if (Math.random() < 0.22) tShake(5);
    } else if (bossCinematic.timer >= 2.4 && bossCinematic.timer < 3.4) {
      if (bossCinematic.state !== 'roar') {
        bossCinematic.state = 'roar';
        tFlash('#ff0066', 0.65);
        tShake(42);
        if (bgMusic) bgMusic.volume = 0.75; // epic volume boost on roar!
        addScreenShockwave(W()/2, H()*0.35, '#ff0055');
        addScreenShockwave(W()/2, H()*0.35, '#00ffff');
        // Spawn massive roar spark bursts
        for (let i = 0; i < 45; i++) {
          const angle = Math.random() * 6.28;
          const sp = 200 + Math.random() * 450;
          const fx = fxPool.get();
          fx.x = W()/2;
          fx.y = H()*0.35;
          fx.vx = Math.cos(angle) * sp;
          fx.vy = Math.sin(angle) * sp;
          fx.s = 2.5 + Math.random() * 4;
          fx.a = 1.0;
          fx.l = 0.6 + Math.random() * 0.4;
          fx.c = Math.random() < 0.5 ? '#ff0055' : '#00ffff';
        }
      }
      speedMult = 0.0;
      bossCam.zoom += (1.45 - bossCam.zoom) * 8 * dt;
      bossCam.yOffset += (-85 - bossCam.yOffset) * 8 * dt;
    } else {
      // Cinematic is over, bars retracting, camera and music returning to normal
      speedMult += (1.0 - speedMult) * 5 * dt;
      bossCam.zoom += (1.0 - bossCam.zoom) * 6 * dt;
      bossCam.yOffset += (0 - bossCam.yOffset) * 6 * dt;
      if (bgMusic) bgMusic.volume += (0.5 - bgMusic.volume) * 4 * dt;
      
      if (bossCinematic.widescreenPercent <= 0.01) {
        bossCinematic.state = 'complete';
        bossCinematic.widescreenPercent = 0;
        bossCam.zoom = 1.0;
        bossCam.yOffset = 0;
        speedMult = 1.0;
        if (bgMusic) bgMusic.volume = 0.5;
      }
    }

    // Freeze player input and lock coordinates safely
    inp = false;
    inpJ = false;
    inpSlide = false;
    P.sliding = false;
    P.h = TILE - 6;
    P.vy = 0;
    P.onG = true;
    P.y = groundY() - P.h;
    P.x = 442 * TILE;
    P.rot = 0;
    P.tRot = 0;
  }

  gTime+=dt;beatP=Math.sin(gTime*8)*.5+.5;
  const GY=groundY(),SPD=BASE_SPEED*speedMult;

  P.x+=SPD*dt;
  const tcx=Math.max(0,P.x-W()/2);camX+=(tcx-camX)*8*dt;if(Math.abs(camX-tcx)<1)camX=tcx;

  for(const t of trolls){
    if(t.type==='blindness'){
      if(!t.triggered && P.x > t.col*TILE){
        t.triggered=true;
        tFlash('#000', 0.8); // Black flash right before a spike
      }
      continue;
    }
    
    if(!t.triggered && P.x > t.col*TILE - t.trigDist){
      t.triggered=true;
    }
    if(t.type==='pit'&&t.triggered&&!t.didShake){
      const pitX=t.col*TILE-camX;
      if(pitX<W()-TILE&&pitX>-TILE*(t.w+1)){tShake(15);t.didShake=true;}
    }
    if(t.triggered) t.val+=dt;
  }

  if(gameMode==='cube'){
    if(inpSlide) {
      if(!P.sliding && P.onG) {
        if(gravFlip === 1) P.y = GY - 16;
        else P.y = CEILING_Y;
      }
      P.sliding=true;
      P.h=16;
      P.rot=0; P.tRot=0; // Reset rotation so the block is perfectly flat when sliding!
    } else {
      if(P.sliding && P.onG) {
        if(gravFlip === 1) P.y = GY - (TILE-6);
        else P.y = CEILING_Y;
      }
      P.sliding=false;
      P.h=TILE-6; // 42
    }
    P.vy+=GRAVITY*gravFlip*dt;
    P.y+=P.vy*dt;
    P.onG=false;
    const currentlyOverPit = isOverPit(P.x);
    if(gravFlip===1&&P.y+P.h>=GY&&!currentlyOverPit){P.y=GY-P.h;P.vy=0;P.onG=true;}
    if(gravFlip===-1&&P.y<=CEILING_Y){P.y=CEILING_Y;P.vy=0;P.onG=true;}
    if(currentlyOverPit&&P.y>GY+10){die();return;} // fast pit death (10px below ground)
    if(P.y>GY+300||P.y<CEILING_Y-300){die();return;}
    if(!P.onG){const vn=Math.abs(P.vy)/820;P.st=1+vn*.15;P.sq=1-vn*.08;}
    else{P.sq+=(1-P.sq)*12*dt;P.st+=(1-P.st)*12*dt;}
    if(P.onG&&!wasOG){const sx=P.x-camX;spLand(sx,gravFlip===1?P.y+P.h:P.y);P.sq=.7;P.st=1.3;addGW(sx+P.w/2);}
  }else{
    // WAVE MODE
    const wSpd=SPD*.85;
    P.vy=inp?-wSpd:wSpd;
    P.y+=P.vy*dt;P.onG=false;
    if(P.y<CEILING_Y){P.y=CEILING_Y;}
    if(P.y+P.h>GY&&!isOverPit(P.x)){P.y=GY-P.h;}
    if(P.y>GY+100||P.y<CEILING_Y-100){die();return;}
    P.sq=1;P.st=1;
    // smooth rotation toward movement direction
    const tgtRot=inp?-45:45;
    P.rot+=(tgtRot-P.rot)*12*dt;P.tRot=P.rot;
  }
  wasOG=P.onG;

  // Section tracking
  const pc=Math.floor(P.x/TILE);
  for(let i=SECS.length-1;i>=0;i--){if(pc>=SECS[i].s){if(curSec!==i){curSec=i;secA=1.5;secN=SECS[i].n;secC=SECS[i].c;}break;}}
  if(secA>0)secA-=dt*.6;

  // Obstacles
  for(const o of obs){
    if(o.troll) {
      if(!o.triggered && P.x > o.x - o.trigDist) {
        o.triggered = true;
      }
      if(o.triggered) o.val += dt;
      
      if(o.troll === 'spike_up' || o.troll === 'wall_up') {
        o.y = GY + TILE - Math.min(o.val * 3000, TILE * (o.row + 2));
      } else if(o.troll === 'fake_spike') {
        o.y = GY - TILE + Math.min(o.val * 2000, TILE); // Shrinks into the ground
      } else if(o.troll === 'moving_pad') {
        o.x = o.startX + Math.sin(o.val * 5) * TILE * 1.5; // Moves left and right
      } else if(o.troll === 'falling_ceil_spike') {
        o.y = Math.min(GY - TILE - 20, CEILING_Y + o.val * 1800);
        if(o.y === GY - TILE - 20 && !o.didCrash) {
          o.didCrash = true;
          tShake(16);
          tFlash('rgba(255,100,0,0.25)', 0.25);
          spFX(o.x - camX + TILE/2, GY, ['#ff2a6d', '#ff7700', '#fff'], 22, 70, 250, 0.5);
        } else if(!o.didCrash) {
          const sox = o.x - camX;
          if(sox > -TILE && sox < W() + TILE && Math.random() < dt * 35) {
            const p = fxPool.get();
            p.x = sox + Math.random() * TILE;
            p.y = o.y - 10 + Math.random() * 20;
            p.vx = -40 - Math.random() * 50;
            p.vy = -80 - Math.random() * 120;
            p.s = 2 + Math.random() * 2.5;
            p.a = 1.0;
            p.l = 0.4 + Math.random() * 0.3;
            p.c = ['#ff003c', '#ff5500', '#ffaa00', '#ffffff'][Math.floor(Math.random() * 4)];
          }
        }
      } else if(o.troll === 'ghost_block' && o.triggered) {
        if(o.val >= 0.15) {
          o.deadBlock = true;
          // Spawn crumbling dust
          spFX(o.x - camX + TILE/2, o.y + TILE/2, ['#7b4fff', '#ff2a6d', '#fff'], 8, 30, 90, 0.30);
        }
      } else if(o.troll === 'shifting_orb') {
        if(!o.triggered && P.x > o.x - 110) {
          o.triggered = true;
          o.startX = o.x;
          o.startY = o.y;
          o.x += 1.5 * TILE;
          o.y -= 1.5 * TILE;
          // Double warp particles
          spFX(o.startX - camX + TILE/2, o.startY + TILE/2, ['#7b4fff', '#ff2a6d', '#fff'], 15, 40, 100, 0.4);
          spFX(o.x - camX + TILE/2, o.y + TILE/2, ['#00ff87', '#fff'], 15, 40, 100, 0.4);
        }
      }
    } else if(!o.following) {
      o.y=o.cl?CEILING_Y+o.row*TILE:GY-(o.row+1)*TILE;
    }
    const sox=o.x-camX;
    if(o.troll&&o.triggered&&!o.didShake&&(o.troll==='spike_up'||o.troll==='wall_up')&&sox<W()-40&&sox>-TILE*2){tShake(15);o.didShake=true;}
    if(sox>W()+TILE*2||sox<-TILE*2)continue;

    if(o.t===1){
      if(o.deadBlock) continue;
      if(aabb(P.x,P.y,P.w,P.h,o.x,o.y,o.w,o.h)){
        if(gameMode==='wave'){die();return;} // wave: any block = death
        const oL=(P.x+P.w)-o.x,oR=(o.x+o.w)-P.x,oT=(P.y+P.h)-o.y,oB=(o.y+o.h)-P.y;
        const m=Math.min(oL,oR,oT,oB);
        if(gravFlip===1){
          // if we are falling into a pit, don't let side collisions save us by teleporting up
          if(P.y+P.h>GY+5) { die(); return; }
          
          if(m===oT&&P.vy>=0){
            P.y=o.y-P.h;P.vy=0;P.onG=true;
            if(o.troll === 'ghost_block' && !o.triggered) {
              o.triggered = true; o.val = 0;
            }
          }
          else if(m===oL){die();return;}
          else if(m===oB&&P.vy<0){P.y=o.y+o.h;P.vy=0;}
        }else{
          if(m===oB&&P.vy<=0){
            P.y=o.y+o.h;P.vy=0;P.onG=true;
            if(o.troll === 'ghost_block' && !o.triggered) {
              o.triggered = true; o.val = 0;
            }
          }
          else if(m===oL){die();return;}
          else if(m===oT&&P.vy>0){P.y=o.y-P.h;P.vy=0;}
        }
      }
    }else if(o.t===2){
      if(o.following)continue;
      if(o.troll === 'fake_spike')continue;
      if(o.troll === 'falling_ceil_spike') {
        let hx = o.x + 8, hy = o.y, hw = o.w - 16, hh = o.h * 0.85;
        if(aabb(P.x + 2, P.y + 2, P.w - 4, P.h - 4, hx, hy, hw, hh)) { die(); return; }
      } else {
        let hx,hy,hw,hh;
        if(o.cl){hx=o.x+12;hy=o.y;hw=o.w-24;hh=o.h*.6;}
        else{hx=o.x+12;hy=o.y+TILE*.4;hw=o.w-24;hh=o.h*.6;}
        if(aabb(P.x+6,P.y+6,P.w-12,P.h-12,hx,hy,hw,hh)){die();return;}
      }
    }else if(o.t===3){
      const pid=o.col+'p';
      if(!usedPads.has(pid)&&aabb(P.x,P.y,P.w,P.h,o.x,o.y,o.w,o.h)){
        usedPads.add(pid);
        P.vy=PAD_VEL*gravFlip;P.onG=false;P.tRot+=180;
        spPad(sox+TILE/2,o.y+TILE/2);tFlash(C.pad,.25);addGW(sox+TILE/2);
      }
    }else if(o.t===4){
      const oid=o.col+'_'+o.row;
      if(aabb(P.x-25,P.y-25,P.w+50,P.h+50,o.x,o.y,o.w,o.h)&&!usedOrbs.has(oid)){
        P.canOrb=true;
        if(inpJ){P.vy=ORB_VEL*gravFlip;P.tRot+=90;usedOrbs.add(oid);P.canOrb=false;spOrb(sox+TILE/2,o.y+TILE/2);tFlash(C.orb,.15);}
      }
    }else if(o.t===5){
      const pid=o.col+'gp';
      if(!usedPortals.has(pid)&&P.x+P.w>o.x&&P.x<o.x+TILE){
        usedPortals.add(pid);gravFlip*=-1;P.onG=false;gravAnim=.5;
        const pc2=gravFlip===-1?C.p1:C.pb1;
        spPortal(sox+TILE/2,o.y+TILE/2,pc2);tFlash(pc2,.4);tShake(12);
      }
    }else if(o.t===6){
      const pid=o.col+'sp';
      if(!usedPortals.has(pid)&&P.x+P.w>o.x&&P.x<o.x+TILE){
        usedPortals.add(pid);
        speedMult=o.flag||1;
        const sc=speedMult<1?C.speedSlow:speedMult>1?C.speedFast:'#ffffff';
        spPortal(sox+TILE/2,o.y+TILE/2,sc);tFlash(sc,.3);
      }
    }else if(o.t===8){
      const pid=o.col+'wp';
      if(!usedPortals.has(pid)&&P.x+P.w>o.x&&P.x<o.x+TILE){
        usedPortals.add(pid);gameMode='wave';P.onG=false;
        spPortal(sox+TILE/2,o.y+TILE/2,C.wave1);tFlash(C.wave1,.3);
      }
    }else if(o.t===11){
      const pid=o.col+'cp';
      if(!usedPortals.has(pid)&&P.x+P.w>o.x&&P.x<o.x+TILE){
        usedPortals.add(pid);gameMode='cube';
        spPortal(sox+TILE/2,o.y+TILE/2,C.c1);tFlash(C.c1,.3);
      }
    }else if(o.t===9){
      const cid=o.col+'_'+o.row+'c';
      if(!coins.has(cid)&&aabb(P.x,P.y,P.w,P.h,o.x,o.y,o.w,o.h)){
        coins.add(cid);spCoin(sox+TILE/2,o.y+TILE/2);tFlash(C.coin,.12);
      }
    }else if(o.t===12){
      const pid=o.col+'tw';
      if(!usedPortals.has(pid)&&aabb(P.x,P.y,P.w,P.h,o.x,o.y,o.w,o.h)){
        usedPortals.add(pid);
        timeWarpTimer = 0.8; // 0.8s of epic slow motion!
        tShake(25);
        tFlash('rgba(147, 51, 234, 0.45)', 0.45);
        spPortal(sox+TILE/2, o.y+TILE/2, '#9333ea');
        addScreenShockwave(sox+TILE/2, o.y+TILE/2, '#9333ea');
      }
    }
  }

  // Jump (cube mode only)
  if(gameMode==='cube'&&inp&&P.onG&&!P.sliding){
    P.vy=JUMP_VEL*gravFlip;P.onG=false;P.tRot+=90;P.sq=1.3;P.st=.7;
    const sx=P.x-camX,jy=gravFlip===1?P.y+P.h:P.y;spJump(sx,jy);addGW(sx+P.w/2);
    addScreenShockwave(sx,jy,C.c1);
    for(let i=0;i<8;i++){const p=fxPool.get();p.x=sx+Math.random()*P.w-P.w/2;p.y=jy;p.vx=(Math.random()-.5)*200;p.vy=gravFlip*(-120-Math.random()*180);p.s=1+Math.random()*3;p.a=1;p.l=.5+Math.random()*.3;p.c=['#fff','#88ffcc',C.c1,C.c2][~~(Math.random()*4)];}
  }
  inpJ=false;

  // Rotation (cube mode)
  if(gameMode==='cube'){
    if(!P.onG)P.rot+=(P.tRot-P.rot)*10*dt;
    else{P.rot=Math.round(P.rot/90)*90;P.tRot=P.rot;}
  }

  P.eyeX+=(2-P.eyeX)*5*dt;P.eyeY+=((P.vy>0?2:-1)-P.eyeY)*5*dt;
  P.gp=Math.sin(gTime*4)*.3+.7;

  trail.push({x:P.x+P.w/2,y:P.y+P.h/2,a:1,t:gTime,vy:P.vy});
  if(trail.length>60)trail.shift();
  for(let g of trail)g.a-=dt*2.0;
  if(IS_MOBILE){
    let keep=0;for(let i=0;i<trail.length;i++){if(trail[i].a>0)trail[keep++]=trail[i];}trail.length=keep;
  }else{
    trail=trail.filter(g=>g.a>0);
  }

  // Walking ground particles — dual color + star bursts / friction sparks if sliding
  if(gameMode==='cube'&&P.onG){
    const sx=P.x-camX,gy2=gravFlip===1?P.y+P.h:P.y;
    if(P.sliding) {
      if(Math.random()<0.95){
        const p=fxPool.get();
        p.x=sx+Math.random()*P.w-P.w/2;
        p.y=gy2;
        p.vx=-140-Math.random()*200;
        p.vy=gravFlip*(-(25+Math.random()*70));
        p.s=1.5+Math.random()*3.8;
        p.a=1.0;
        p.l=0.35+Math.random()*0.3;
        p.c=['#ffaa00','#ff2a6d','#ffffff'][Math.floor(Math.random()*3)];
      }
    } else {
      if(Math.random()<.8){const p=fxPool.get();p.x=sx+Math.random()*10-5;p.y=gy2;p.vx=-50-Math.random()*80;p.vy=gravFlip*(-(25+Math.random()*60));p.s=1.5+Math.random()*3.5;p.a=.9;p.l=.7+Math.random()*.3;p.c=Math.random()<.5?C.cg:C.c2;}
      if(Math.random()<.3){const p=fxPool.get();p.x=sx+Math.random()*6-3;p.y=gy2;p.vx=-30-Math.random()*50;p.vy=gravFlip*(-(40+Math.random()*80));p.s=1+Math.random()*2;p.a=1;p.l=.5;p.c='#fff';}
      if(Math.random()<.08){spFX(sx,gy2,['#fff',C.c1,C.c2,'#ffdd00'],6,40,120,.35);}
    }
  }
  // Wave mode trail sparkles
  if(gameMode==='wave'&&Math.random()<.6){const p=fxPool.get();p.x=P.x-camX-P.w/2+Math.random()*4;p.y=P.y+P.h/2+(Math.random()-.5)*P.h;p.vx=-80-Math.random()*120;p.vy=(Math.random()-.5)*60;p.s=1+Math.random()*2.5;p.a=1;p.l=.4+Math.random()*.2;p.c=Math.random()<.5?C.wave1:'#fff';}

  // Update following spikes
  for(const o of obs){
    if(o.t===2){
      if(!o.following && P.x > o.x + TILE * 1.2){
        o.following = true;
        o.followId = followCount++;
      }
      if(o.following){
        const col = Math.floor(o.followId / 3);
        const row = o.followId % 3;
        const followXOffset = 60 + col * 48;
        const followYOffset = -60 + row * 60;
        const followPhase = row * 1.5 + col * 0.8;
        
        const targetX = P.x - followXOffset;
        const wave = Math.sin(gTime * 1.8 + followPhase) * 35;
        const targetY = P.y + (P.h - TILE)/2 + followYOffset + wave;
        
        o.x += (targetX - o.x) * 4.5 * dt;
        o.y += (targetY - o.y) * 4.5 * dt;
        
        // Point towards the player
        const dx = (P.x + P.w/2) - (o.x + TILE/2);
        const dy = (P.y + P.h/2) - (o.y + TILE/2);
        o.angle = Math.atan2(dy, dx);
      }
    }
  }

  // === CYBER-CAT BOSS LASERS PHYSICS & COLLISIONS ===
  for (const laser of bossLasers) {
    const laserX = laser.col * TILE;
    if (!laser.triggered && P.x > laserX - 360 && P.x < laserX + 100) {
      laser.triggered = true;
      laser.state = 'warning';
      laser.timer = 0;
    }
    
    if (laser.state === 'warning') {
      laser.timer += dt;
      if (laser.timer >= 0.7) {
        laser.state = 'active';
        laser.timer = 0;
        tShake(12);
        tFlash('rgba(255, 0, 85, 0.15)', 0.15);
      }
    } else if (laser.state === 'active') {
      laser.timer += dt;
      if (laser.timer >= 0.45) {
        laser.state = 'fired';
      } else {
        const midX = laserX + TILE/2;
        if (P.x + P.w > midX - 14 && P.x < midX + 14) {
          if (laser.type === 'high') {
            if (!P.sliding) {
              deathCause = 'high_laser';
              die();
              return;
            }
          } else if (laser.type === 'low') {
            if (P.y + P.h > GY - 32) {
              deathCause = 'low_laser';
              die();
              return;
            }
          }
        }
        
        if (Math.random() < dt * 45) {
          const px = midX - camX + (Math.random() - 0.5) * 20;
          const py = (laser.type === 'high') ? (GY - 36 + Math.random() * 20) : (GY - Math.random() * 20);
          const p = fxPool.get();
          p.x = px;
          p.y = py;
          p.vx = (Math.random() - 0.5) * 160;
          p.vy = -Math.random() * 180;
          p.s = 2 + Math.random() * 3;
          p.a = 1.0;
          p.l = 0.35 + Math.random() * 0.25;
          p.c = ['#ffffff', '#ff0055', '#ff55aa'][Math.floor(Math.random() * 3)];
        }
      }
    }
  }

  if(Math.random()<dt*12)spAmb();
  updPart(dt);

  for(let i=gWaves.length-1;i>=0;i--){const w=gWaves[i];w.r+=w.sp*dt;w.a-=dt*2.5;if(w.a<=0)gWaves.splice(i,1);}
  if(gravAnim>0)gravAnim-=dt*2.5;
  if(shake.i>.1){shake.x=(Math.random()-.5)*shake.i;shake.y=(Math.random()-.5)*shake.i;shake.i*=shake.d;}else{shake.x=0;shake.y=0;shake.i=0;}
  if(flashA>0)flashA-=dt*4;

  progress=Math.min(P.x/levelEnd,1);
  if(P.x>=levelEnd){state='win';winT=0;tFlash('#ffd700',.5); if(bgMusic) bgMusic.pause();}
}

function updPart(dt){
  for(let i=dPool.a.length-1;i>=0;i--){const p=dPool.a[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=400*dt;p.l-=dt*.7;p.a=Math.max(0,p.l);p.rot+=p.vr*dt;p.vx*=.99;if(p.l<=0)dPool.free(p);}
  for(let i=fxPool.a.length-1;i>=0;i--){const p=fxPool.a[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=250*dt;p.l-=dt*2.5;p.a=Math.max(0,p.l);if(p.l<=0)fxPool.free(p);}
  for(let i=amPool.a.length-1;i>=0;i--){const p=amPool.a[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.p+=dt*3;p.l-=dt;const l=p.l;p.a=(l>3?Math.min(1,4-l):Math.min(l/.5,1))*.35*(.5+Math.sin(p.p)*.5);if(p.l<=0)amPool.free(p);}
  for(let i=fwPool.a.length-1;i>=0;i--){const p=fwPool.a[i];p.tr.push({x:p.x,y:p.y});if(p.tr.length>8)p.tr.shift();p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=150*dt;p.vx*=.98;p.vy*=.98;p.l-=dt;p.a=Math.max(0,p.l);if(p.l<=0)fwPool.free(p);}
}

function getSec(){return SECS[Math.max(0,curSec)]||SECS[0];}

    }

    ctx.fillRect(0,0,w,h);
    
    for(const n of bgNeb){
      const nx=((n.x-camX*n.sp)%(w+n.w*2)+w+n.w)%(w+n.w*2)-n.w,ny=n.y*(h/800)+Math.sin(gTime*.5+n.ph)*20,pu=.025+Math.sin(gTime*.8+n.ph)*.012;
      ctx.globalAlpha = pu;
      ctx.drawImage(getMobNebula(n.c), nx, ny, n.w, n.h);
    }
    ctx.globalAlpha=1;
    
    for(const s of bgStars){const sx=((s.x-camX*.04)%(w+100)+w+100)%(w+100),sy=s.y*(h/800);s.b+=s.tw;const br=.2+Math.sin(s.b)*.4+Math.sin(s.b*2.7)*.2;if(br<.1)continue;ctx.globalAlpha=Math.max(0,Math.min(1,br));ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy,s.s*.6,0,6.28);ctx.fill();}
    ctx.globalAlpha=1;
    
    const gs=70,ox=-(camX*.15)%gs;ctx.lineWidth=1;
    ctx.strokeStyle='#643cc8';
    for(let x=ox;x<w;x+=gs){const al=0.03-Math.abs(x-w/2)/w*0.025;if(al>0){ctx.globalAlpha=al;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}}
    for(let y=0;y<h;y+=gs){const al=0.03-Math.abs(y-h/2)/h*0.025;if(al>0){ctx.globalAlpha=al;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}}
    ctx.globalAlpha=1;
    
    ctx.globalAlpha=.05;ctx.fillStyle='#7b4fff';const o1=-(camX*.08)%300;ctx.beginPath();ctx.moveTo(0,h);for(let x=o1-300;x<w+300;x+=60)ctx.lineTo(x,h-220-Math.sin(x*.003)*120-Math.cos(x*.005)*50);ctx.lineTo(w,h);ctx.closePath();ctx.fill();
    ctx.fillStyle='#ff2a6d';const o2=-(camX*.15)%250;ctx.beginPath();ctx.moveTo(0,h);for(let x=o2-250;x<w+250;x+=50)ctx.lineTo(x,h-140-Math.sin(x*.005+1)*70);ctx.lineTo(w,h);ctx.closePath();ctx.fill();ctx.globalAlpha=1;
    return;
  }
  const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,sec.b1);g.addColorStop(.5,sec.b2);g.addColorStop(1,sec.b3);
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  for(const n of bgNeb){const nx=((n.x-camX*n.sp)%(w+n.w*2)+w+n.w)%(w+n.w*2)-n.w,ny=n.y*(h/800)+Math.sin(gTime*.5+n.ph)*20,pu=.025+Math.sin(gTime*.8+n.ph)*.012;const ng=ctx.createRadialGradient(nx+n.w/2,ny+n.h/2,0,nx+n.w/2,ny+n.h/2,n.w/2);ng.addColorStop(0,n.c+pu+')');ng.addColorStop(1,n.c+'0)');ctx.fillStyle=ng;ctx.fillRect(nx,ny,n.w,n.h);}
  for(const s of bgStars){const sx=((s.x-camX*.04)%(w+100)+w+100)%(w+100),sy=s.y*(h/800);s.b+=s.tw;const br=.2+Math.sin(s.b)*.4+Math.sin(s.b*2.7)*.2;if(br<.1)continue;ctx.globalAlpha=Math.max(0,Math.min(1,br));ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy,s.s*.6,0,6.28);ctx.fill();}
  ctx.globalAlpha=1;
  const gs=70,ox=-(camX*.15)%gs;ctx.lineWidth=1;
  for(let x=ox;x<w;x+=gs){ctx.strokeStyle=`rgba(100,60,200,${.03-Math.abs(x-w/2)/w*.025})`;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=gs){ctx.strokeStyle=`rgba(100,60,200,${.03-Math.abs(y-h/2)/h*.025})`;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  ctx.globalAlpha=.05;ctx.fillStyle='#7b4fff';const o1=-(camX*.08)%300;ctx.beginPath();ctx.moveTo(0,h);for(let x=o1-300;x<w+300;x+=60)ctx.lineTo(x,h-220-Math.sin(x*.003)*120-Math.cos(x*.005)*50);ctx.lineTo(w,h);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ff2a6d';const o2=-(camX*.15)%250;ctx.beginPath();ctx.moveTo(0,h);for(let x=o2-250;x<w+250;x+=50)ctx.lineTo(x,h-140-Math.sin(x*.005+1)*70);ctx.lineTo(w,h);ctx.closePath();ctx.fill();ctx.globalAlpha=1;

function drawSpdLines(){
  const w=W(),h=H(),sec=getSec();
  for(const l of spdLines){
    l.x-=l.sp*.015*speedMult;if(l.x<-.3){l.x=1.1;l.y=Math.random();l.a=.01+Math.random()*.06;l.h=Math.random()*360;}
    const al=l.a*speedMult*(0.8+Math.sin(gTime*4+l.h)*.2);
    if(al<.005)continue;
    const lx=l.x*w,ly=l.y*h,lw=l.l*speedMult;
    // Colored glow line
    ctx.globalAlpha=al*.5;
    ctx.strokeStyle=sec.c||'#fff';
    ctx.lineWidth=3;
    ctx.shadowColor=sec.c||'#fff';ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+lw,ly);ctx.stroke();
    // White core
    ctx.globalAlpha=al;
    ctx.strokeStyle='#fff';
    ctx.lineWidth=1.2;
    ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+lw,ly);ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

function drawGround(){
  if (state === 'multiplayerSandbox') {
    const w=W(),h=H(),gy=groundY();
    const ts=TILE/2,cols=Math.ceil(w/ts)+2,rows=Math.ceil((h-gy)/ts)+1;
    const ox=-Math.floor(camX%ts);
    
    // Checkered plaine
    for(let r=0;r<rows;r++) {
      for(let c=0;c<cols;c++){
        const wx=c+Math.floor(camX/ts),dk=(wx+r)%2===0;
        ctx.fillStyle=dk?'rgba(26,10,58,.95)':'rgba(34,14,74,.95)';
        ctx.fillRect(ox+c*ts,gy+r*ts,ts+1,ts+1);
      }
    }
    
    // Glowing neon ground lines
    ctx.save();
    ctx.shadowColor=C.cg;
    ctx.shadowBlur=15+beatP*8;
    ctx.strokeStyle=C.cg;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(0, gy);
    ctx.lineTo(w, gy);
    ctx.stroke();
    ctx.restore();
    
    ctx.save();
    ctx.shadowColor=C.c2;
    ctx.shadowBlur=30;
    ctx.strokeStyle=`rgba(0,201,255,${.12+beatP*.08})`;
    ctx.lineWidth=6;
    ctx.beginPath();
    ctx.moveTo(0, gy);
    ctx.lineTo(w, gy);
    ctx.stroke();
    ctx.restore();
    return;
  }
  const w=W(),h=H(),gy=groundY(),ts=TILE/2,sc=Math.floor(camX/ts),ox=-(camX%ts);
  const rows=Math.ceil((h-gy)/ts)+1,cols=Math.ceil(w/ts)+2;
  
  if(IS_MOBILE){
    ctx.save();
    ctx.translate(ox - (sc%2===0?0:ts), gy);
    ctx.fillStyle = getMobGroundPattern();
    ctx.fillRect(-TILE, 0, w+TILE*2, h-gy+TILE);
    ctx.restore();
    for(const pit of PITS){
        const psx=pit[0]*TILE-camX,pex=(pit[1]+1)*TILE-camX;
        if(pex<0||psx>w)continue;
        ctx.clearRect(psx, gy, pex-psx, h-gy);
    }
    for(const t of trolls){
        if(t.type==='pit'&&t.triggered){
            const psx=t.col*TILE-camX, pex=(t.col+t.w)*TILE-camX;
            if(pex<0||psx>w)continue;
            ctx.clearRect(psx, gy, pex-psx, h-gy);
            const tY=t.val*t.val*1200;
            if(tY < h-gy) {
                ctx.save();ctx.translate(psx, gy+tY);
                ctx.fillStyle = getMobGroundPattern();
                const ptOffsetX = (psx + camX) % (TILE);
                ctx.translate(-ptOffsetX, 0);
                ctx.fillRect(ptOffsetX, 0, pex-psx, h-gy);
                ctx.restore();
            }
        }
    }
    for(const pit of PITS){
      const psx=pit[0]*TILE-camX,pex=(pit[1]+1)*TILE-camX;
      if(pex<-TILE||psx>w+TILE)continue;
      const vg=ctx.createLinearGradient(0,gy,0,gy+TILE*4);
      vg.addColorStop(0,'rgba(255,42,109,0.12)');vg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=vg;ctx.fillRect(psx,gy,pex-psx,TILE*4);
      ctx.save();ctx.shadowColor='#ff2a6d';ctx.shadowBlur=8;
      ctx.strokeStyle='#ff2a6d';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(psx,gy);ctx.lineTo(psx,gy+TILE*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(pex,gy);ctx.lineTo(pex,gy+TILE*2);ctx.stroke();
      ctx.restore();
      const pulse=Math.sin(gTime*4+pit[0])*.4+.6;
      ctx.fillStyle=`rgba(255,42,109,${pulse*.15})`;ctx.beginPath();ctx.arc(psx,gy,4+pulse*3,0,6.28);ctx.fill();
      ctx.beginPath();ctx.arc(pex,gy,4+pulse*3,0,6.28);ctx.fill();
    }
    if(gravFlip===-1||gameMode==='wave'){
      ctx.fillStyle='rgba(26,10,58,.6)';ctx.fillRect(0,0,w,CEILING_Y);
      ctx.save();ctx.shadowColor=gameMode==='wave'?C.wave1:C.p1;ctx.shadowBlur=8;
      ctx.strokeStyle=gameMode==='wave'?C.wave1:C.p1;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(0,CEILING_Y);ctx.lineTo(w,CEILING_Y);ctx.stroke();ctx.restore();
    }
    ctx.save();ctx.shadowColor=C.cg;ctx.shadowBlur=10+beatP*5;ctx.strokeStyle=C.cg;ctx.lineWidth=2;
    let inLine=false;
    for(let x=0;x<w;x+=8){
      const tCol=Math.floor((x+camX)/TILE);
      let isPit=false;for(const p of PITS){if(tCol>=p[0]&&tCol<=p[1]){isPit=true;break;}}
      if(!isPit)for(const t of trolls){if(t.type==='pit'&&t.triggered&&tCol>=t.col&&tCol<t.col+t.w){isPit=true;break;}}
      let wv=0;
      if(!isPit)for(const gw of gWaves){const d=Math.abs(x-gw.x);if(d<gw.r+60)wv+=Math.sin((d-gw.r)*.1)*8*gw.a*Math.max(0,1-d/(gw.r+60));}
      if(isPit){if(inLine){ctx.stroke();inLine=false;}}else{if(!inLine){ctx.beginPath();ctx.moveTo(x,gy+wv);inLine=true;}else{ctx.lineTo(x,gy+wv);}}
    }
    if(inLine)ctx.stroke();ctx.restore();
    ctx.save();ctx.shadowColor=C.c2;ctx.shadowBlur=15;ctx.strokeStyle=`rgba(0,201,255,${.12+beatP*.08})`;ctx.lineWidth=6;
    inLine=false;
    for(let x=0;x<w;x+=12){
      const tCol=Math.floor((x+camX)/TILE);
      let isPit=false;for(const p of PITS){if(tCol>=p[0]&&tCol<=p[1]){isPit=true;break;}}
      if(!isPit)for(const t of trolls){if(t.type==='pit'&&t.triggered&&tCol>=t.col&&tCol<t.col+t.w){isPit=true;break;}}
      if(isPit){if(inLine){ctx.stroke();inLine=false;}}else{if(!inLine){ctx.beginPath();ctx.moveTo(x,gy);inLine=true;}else{ctx.lineTo(x,gy);}}
    }
    if(inLine)ctx.stroke();ctx.restore();
    return;
  }

  // Draw ground tiles, skipping pits
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const tileCol=Math.floor((sc+c)*ts/TILE);
    let inPit=false;for(const p of PITS){if(tileCol>=p[0]&&tileCol<=p[1]){inPit=true;break;}}
    if(inPit)continue;
    
    let tY=0,tRot=0;
    for(const t of trolls){
      if(t.type==='pit'&&tileCol>=t.col&&tileCol<t.col+t.w){
        if(t.triggered){tY=t.val*t.val*1200;tRot=t.val*((tileCol%2===0)?2:-2);}
        break;
      }
    }
    
    const wx=c+sc,dk=(wx+r)%2===0;
    ctx.fillStyle=dk?'rgba(26,10,58,.95)':'rgba(34,14,74,.95)';
    if(tY>0){
      ctx.save();ctx.translate(ox+c*ts+ts/2,gy+r*ts+ts/2+tY);ctx.rotate(tRot);
      ctx.fillRect(-ts/2,-ts/2,ts+1,ts+1);ctx.restore();
    }else{
      ctx.fillRect(ox+c*ts,gy+r*ts,ts+1,ts+1);
    }
  }
  // Pit edge effects — glowing danger edges
  for(const pit of PITS){
    const psx=pit[0]*TILE-camX,pex=(pit[1]+1)*TILE-camX;
    if(pex<-TILE||psx>w+TILE)continue;
    // Danger gradient falling into void
    const vg=ctx.createLinearGradient(0,gy,0,gy+TILE*4);
    vg.addColorStop(0,'rgba(255,42,109,0.12)');vg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=vg;ctx.fillRect(psx,gy,pex-psx,TILE*4);
    // Glowing edges
    ctx.save();ctx.shadowColor='#ff2a6d';ctx.shadowBlur=12;
    ctx.strokeStyle='#ff2a6d';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(psx,gy);ctx.lineTo(psx,gy+TILE*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pex,gy);ctx.lineTo(pex,gy+TILE*2);ctx.stroke();
    ctx.restore();
    // Warning particles at edges
    const pulse=Math.sin(gTime*4+pit[0])*.4+.6;
    ctx.fillStyle=`rgba(255,42,109,${pulse*.15})`;ctx.beginPath();ctx.arc(psx,gy,4+pulse*3,0,6.28);ctx.fill();
    ctx.beginPath();ctx.arc(pex,gy,4+pulse*3,0,6.28);ctx.fill();
  }
  // Ceiling during grav flip or wave
  if(gravFlip===-1||gameMode==='wave'){ctx.fillStyle='rgba(26,10,58,.6)';ctx.fillRect(0,0,w,CEILING_Y);ctx.save();ctx.shadowColor=gameMode==='wave'?C.wave1:C.p1;ctx.shadowBlur=12;ctx.strokeStyle=gameMode==='wave'?C.wave1:C.p1;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,CEILING_Y);ctx.lineTo(w,CEILING_Y);ctx.stroke();ctx.restore();}
  // Ground glow line — breaks at pits
  ctx.save();ctx.shadowColor=C.cg;ctx.shadowBlur=15+beatP*8;ctx.strokeStyle=C.cg;ctx.lineWidth=2;
  let inLine=false;
  for(let x=0;x<w;x+=4){
    const worldX=x+camX,tCol=Math.floor(worldX/TILE);

function drawTrail(){
  if(trail.length<2||P.dead)return;
  ctx.save();
  ctx.lineCap='round';
  ctx.lineJoin='round';
  const step = gameMode==='wave' ? 2 : 1;
  const isWave = gameMode==='wave';
  
  // Layer 1: Wide outer glow trail
  for(let i=step;i<trail.length;i+=step){
    const p0=trail[i-step],p1=trail[i],al=p1.a*.4;
    if(al<=0)continue;
    const hue=(p1.t*80)%360;
    ctx.globalAlpha=al*.25;
    ctx.strokeStyle=`hsla(${hue},100%,50%,1)`;
    ctx.lineWidth=isWave?12:18;
    if(i>trail.length-12){ctx.shadowColor=`hsla(${hue},100%,50%,1)`;ctx.shadowBlur=20;}else{ctx.shadowBlur=0;}
    ctx.beginPath();ctx.moveTo(p0.x-camX,p0.y);ctx.lineTo(p1.x-camX,p1.y);ctx.stroke();
  }
  // Layer 2: Mid-color neon trail
  for(let i=step;i<trail.length;i+=step){
    const p0=trail[i-step],p1=trail[i],al=p1.a*.6;
    if(al<=0)continue;
    const hue=(p1.t*80)%360;
    ctx.globalAlpha=al*.45;
    ctx.strokeStyle=`hsla(${hue},100%,70%,1)`;
    ctx.lineWidth=isWave?6:10;
    ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(p0.x-camX,p0.y);ctx.lineTo(p1.x-camX,p1.y);ctx.stroke();
  }
  // Layer 3: Bright white-hot core
  for(let i=step;i<trail.length;i+=step){
    const p0=trail[i-step],p1=trail[i],al=p1.a*.8;
    if(al<=0)continue;
    const hue=(p1.t*80)%360;
    ctx.globalAlpha=al*.9;
    ctx.strokeStyle=`hsla(${hue},100%,90%,1)`;
    ctx.lineWidth=isWave?2:3.5;
    ctx.beginPath();ctx.moveTo(p0.x-camX,p0.y);ctx.lineTo(p1.x-camX,p1.y);ctx.stroke();
  }
  // Layer 4: Sparkle dots along trail
  ctx.shadowBlur=0;
  for(let i=step*3;i<trail.length;i+=step*3){
    const p1=trail[i],al=p1.a;
    if(al<=0)continue;
    const hue=(p1.t*80)%360;
    ctx.globalAlpha=al*.7;
    ctx.fillStyle=`hsla(${(hue+120)%360},100%,80%,1)`;
    const sparkS=1.5+Math.sin(gTime*20+i)*1.5;
    ctx.beginPath();ctx.arc(p1.x-camX,p1.y,sparkS,0,6.28);ctx.fill();
  }
  ctx.restore();
}

    // White inner core

    ctx.shadowBlur = 0;
    ctx.beginPath();

    ctx.lineTo(targetX, barY);
    ctx.moveTo(eyeRX, eyeRY);

      ctx.arc(targetX + Math.cos(angle) * dist, barY + Math.sin(angle) * dist, 1.5, 0, 6.28);

    }

  }

  // Draw Custom Retro Progress Slider Track
  ctx.save();
  ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
  ctx.beginPath();
  ctx.roundRect(barX, barY - 6, barW, 12, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();
  
  // Neon progress bar fill

    fillG.addColorStop(0, '#ff0055');
    fillG.addColorStop(1, '#ffcc00');
    
    ctx.fillStyle = fillG;
    ctx.shadowColor = '#ff0055';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.roundRect(barX, barY - 6, barW * progress, 12, 6);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  
  // Graduations along the track
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';

  // Custom neon Skull Pointer

  ctx.shadowBlur = 20;

  ctx.lineTo(4, -4);
  ctx.lineTo(-4, -4);
  ctx.lineTo(-6, -8);

  ctx.fill();
  
  // Skull eyes

  // Skull teeth lines

  ctx.lineWidth = 1.2;
  ctx.beginPath();

  ctx.moveTo(2, -8); ctx.lineTo(2, -4);

  ctx.restore();
  
  // Clashing Red FAIL! label clignotant

  const fPulse = 1.0 + Math.sin(gTime * 18) * 0.12;

  ctx.lineWidth = 1.0;
  ctx.strokeText(`FAIL! ${~~(progress * 100)}%`, 0, 0);
  ctx.restore();
  ctx.restore();

  // Glassmorphism Sarcastic Roast Bubble
  const bubbleW = w * 0.72, bubbleH = 88;

function drawMenu(){

  // 1. Synthwave Background Gradient
  const bgG = ctx.createLinearGradient(0, 0, 0, h);
  bgG.addColorStop(0, '#02020a');
  bgG.addColorStop(0.5, '#120525');
  bgG.addColorStop(1, '#050212');
  ctx.fillStyle = bgG;
  ctx.fillRect(0, 0, w, h);
  
  // 2. Neon Sliced Outrun Sunset
  const sunX = w / 2, sunY = h / 2 - 40, sunR = 120;
  const sunG = ctx.createLinearGradient(0, sunY - sunR, 0, sunY + sunR);
  sunG.addColorStop(0, '#ffcc00'); // top yellow
  sunG.addColorStop(0.5, '#ff2a6d'); // mid pink
  sunG.addColorStop(1, '#9300ff'); // bottom violet-purple
  
  ctx.save();
  ctx.shadowColor = '#ff2a6d';
  ctx.shadowBlur = 40;
  const sliceCount = 8;
  for (let i = 0; i < sliceCount; i++) {
    const ratio = i / sliceCount;
    const nextRatio = (i + 0.85) / sliceCount;
    const sy1 = sunY - sunR + ratio * 2 * sunR;
    const sy2 = sunY - sunR + nextRatio * 2 * sunR;
    
    const gapThickness = Math.pow(ratio, 2.2) * 11;
    const drawY1 = sy1;
    const drawY2 = Math.min(sunY + sunR, sy2 - gapThickness);
    
    if (drawY2 > drawY1) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(sunX, sunY, sunR, 0, 6.28);
      ctx.clip();
      
      ctx.fillStyle = sunG;
      ctx.fillRect(sunX - sunR - 10, drawY1, sunR * 2 + 20, drawY2 - drawY1);
      ctx.restore();
    }
  }
  ctx.restore();
  
  // 3. 3D Perspective Scrolling Grid

  // White front core with neon cyan glow

  // 7. Symmetrical Equalizer Visualizers

  ctx.restore();
}

function drawCDParts() {
  const m = IS_MOBILE;
  for (const p of cdParts) {
    ctx.save();
    ctx.globalAlpha = p.a;
    ctx.fillStyle = p.c;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    
    if (p.sh === 0) {
      ctx.fillRect(-p.s/2, -p.s/2, p.s, p.s);
    } else if (p.sh === 1) {
      ctx.beginPath(); ctx.arc(0, 0, p.s/2, 0, 6.28); ctx.fill();
    } else if (p.sh === 2) {
      ctx.beginPath();
      ctx.moveTo(0, -p.s/2);
      ctx.lineTo(p.s/2, p.s/2);
      ctx.lineTo(-p.s/2, p.s/2);
      ctx.closePath();
      ctx.fill();
    } else if (p.sh === 3) {
      ctx.font = `bold ${p.s * 1.5}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if (!m) {
        ctx.shadowColor = p.c;
        ctx.shadowBlur = 8;
      }
      ctx.fillText(p.char || '0', 0, 0);
    }
    ctx.restore();
  }
}

    ctx.shadowBlur = 15;

    ctx.lineWidth = 2.0;
    ctx.beginPath();
    ctx.moveTo(px - 50, sweepY); ctx.lineTo(px + 50, sweepY);
    ctx.stroke();
    
    // Rotating containment ring
    ctx.translate(px, py);
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 1.2;
    ctx.rotate(gTime * 3);
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.arc(0, 0, 36, 0, 6.28);
    ctx.stroke();
    ctx.restore();
    
    // Compilation progress label
    ctx.save();
    ctx.fillStyle = '#00ff87';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';

    ctx.restore();
    
    // Suction binary particles
    if (Math.random() < 0.3) {
      const angle = Math.random() * 6.28;
      const dist = 100 + Math.random() * 80;
      cdParts.push({
        x: px + Math.cos(angle) * dist,
        y: py + Math.sin(angle) * dist,
        vx: -Math.cos(angle) * 180,
        vy: -Math.sin(angle) * 180,
        s: 8 + Math.random() * 4,

        sh: 3,
        char: Math.random() < 0.5 ? '0' : '1',

  // 4. Monolithic Title Card Reveal (after landing)
  if (t >= 4.4) {
    const p = (t - 4.4) / 1.4;
    const alpha = Math.min(1.0, p * 2);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    // Subtitle

    ctx.shadowBlur = 8;
    ctx.fillText("⚡ ANTIGRAVITY ENGINE PRÉSENTE ⚡", w/2, h/2 - 58);
    
    // Main Title: NEON RUSH with split chromatic aberration

    ctx.scale(titleScale, titleScale);
    const scaleX = w/2 / titleScale;
    const scaleY = h/2 / titleScale;
    
    // Cyan offset shadow

    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 30;

    // Fuchsia offset shadow

    ctx.shadowColor = '#ff0055';
    ctx.fillText("NEON RUSH", scaleX + 3.5, scaleY);
    
    // Main white gradient core

    tg.addColorStop(0, '#ff0055');

    ctx.fillText("NEON RUSH", scaleX, scaleY);

    ctx.lineTo(w/2 + 180 * Math.min(1.0, p * 1.5), h/2 - 76);

    ctx.moveTo(w/2 - 180 * Math.min(1.0, p * 1.5), h/2 + 76);

}
