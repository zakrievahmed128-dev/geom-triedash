// === CYBER-CAT BOSS RENDERERS ===
function drawCyberBoss() {
  if (state === 'multiplayerSandbox') return;
  if (P.x < 442 * TILE && bossCinematic.state === 'inactive') return;
  
  let fade = 0;
  if (bossCinematic.state !== 'inactive') {
    fade = Math.min(1.0, bossCinematic.timer / 1.0);
  } else {
    fade = Math.min(1.0, Math.max(0.0, (P.x - 442 * TILE) / (4 * TILE)));
    if (P.x > 514 * TILE) {
      fade *= Math.max(0, 1 - (P.x - 514 * TILE) / (3 * TILE));
    }
  }
  if (fade <= 0) return;

  const w = W(), h = H(), gy = groundY();
  ctx.save();
  ctx.globalAlpha = fade * 0.85;

  const floatY = Math.sin(gTime * 2.0) * 12;
  const bossX = w / 2;
  const bossY = h * 0.35 + floatY;

  let glitchX = 0;
  if (bossCinematic.state === 'roar') {
    glitchX = (Math.random() - 0.5) * 20;
  } else if (Math.random() < 0.15) {
    glitchX = (Math.random() - 0.5) * 12;
  }

  // Active laser status for expressions and effects
  let activeLaser = null;
  for (const laser of bossLasers) {
    if (laser.state === 'warning' || laser.state === 'active') {
      activeLaser = laser;
      break;
    }
  }

  // Eye locations
  const eyeLX = bossX - 40 + glitchX;
  const eyeLY = bossY - 12;
  const eyeRX = bossX + 40 + glitchX;
  const eyeRY = bossY - 12;

  const dt = 1/60; // stable fallback for rendering loop

  // 1. Draw glowing rotating circular wireframe hologram containment field behind the head
  ctx.save();
  ctx.translate(bossX, bossY);
  ctx.globalAlpha = fade * 0.25;
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#00c9ff';
  ctx.shadowColor = '#00c9ff';
  ctx.shadowBlur = 12 * beatP;
  
  // Concentric circle 1: dashed rotating
  ctx.save();
  ctx.rotate(gTime * 0.4);
  ctx.setLineDash([8, 12]);
  ctx.beginPath(); ctx.arc(0, 0, 150 + Math.sin(gTime * 3) * 8, 0, 6.28); ctx.stroke();
  ctx.restore();
  
  // Concentric circle 2: magenta gear ticks rotating backward
  ctx.strokeStyle = '#ff2a6d';
  ctx.shadowColor = '#ff2a6d';
  ctx.save();
  ctx.rotate(-gTime * 0.6);
  ctx.beginPath(); ctx.arc(0, 0, 115, 0, 6.28); ctx.stroke();
  for (let i = 0; i < 8; i++) {
    const angle = (i * 45) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(Math.cos(angle) * 115, Math.sin(angle) * 115);
    ctx.lineTo(Math.cos(angle) * 128, Math.sin(angle) * 128);
    ctx.stroke();
  }
  ctx.restore();

  // Floating matrix data rings
  ctx.strokeStyle = 'rgba(0, 255, 135, 0.4)';
  ctx.shadowColor = '#00ff87';
  ctx.save();
  ctx.rotate(gTime * 0.25);
  ctx.setLineDash([3, 7]);
  ctx.beginPath(); ctx.arc(0, 0, 185, 0, 6.28); ctx.stroke();
  ctx.restore();
  ctx.restore();

  // 2. Draw holographic wireframe head (with CRT chromatic split slices)
  const drawHead = (offsetX, color, lineWidth, glow, cpVal) => {
    const progress = cpVal !== undefined ? cpVal : 1.0;

    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    if (glow) {
      ctx.shadowColor = color;
      ctx.shadowBlur = glow;
    }
    
    // Slices glitched offsets
    let s1 = 0, s2 = 0, s3 = 0;
    if (activeLaser && activeLaser.state === 'active') {
      s1 = (Math.sin(gTime * 70) * 8);
      s2 = (Math.sin(gTime * 95) * 12);
      s3 = (Math.sin(gTime * 60) * 8);
    } else if (bossCinematic.state === 'roar') {
      s1 = (Math.sin(gTime * 80) * 12);
      s2 = (Math.sin(gTime * 110) * 18);
      s3 = (Math.sin(gTime * 75) * 12);
    } else if (Math.random() < 0.15) {
      s1 = (Math.random() - 0.5) * 8;
      s2 = (Math.random() - 0.5) * 14;
      s3 = (Math.random() - 0.5) * 8;
    }

    // DRAW SLICE 1: Ears
    if (progress > 0.1) {
      ctx.save();
      ctx.translate(bossX + offsetX + glitchX + s1, bossY);
      // Left Ear
      ctx.beginPath();
      ctx.moveTo(-40, -40); ctx.lineTo(-80, -110); ctx.lineTo(-95, -70); ctx.lineTo(-40, -40);
      ctx.stroke();
      // Right Ear
      ctx.beginPath();
      ctx.moveTo(40, -40); ctx.lineTo(80, -110); ctx.lineTo(95, -70); ctx.lineTo(40, -40);
      ctx.stroke();
      ctx.restore();
    }

    // DRAW SLICE 2: Head Outline, Eyes, Forehead
    if (progress > 0.45) {
      ctx.save();
      ctx.translate(bossX + offsetX + glitchX + s2, bossY);
      // Head Outline
      ctx.beginPath();
      ctx.moveTo(-40, -40); ctx.lineTo(40, -40); ctx.lineTo(95, -70); ctx.lineTo(105, 0); ctx.lineTo(65, 55); ctx.lineTo(0, 75); ctx.lineTo(-65, 55); ctx.lineTo(-105, 0); ctx.lineTo(-95, -70);
      ctx.closePath();
      ctx.stroke();

      // Cheeks/Inner Lines
      ctx.beginPath();
      ctx.moveTo(-65, 55); ctx.lineTo(-40, 10); ctx.lineTo(40, 10); ctx.lineTo(65, 55);
      ctx.stroke();

      // Forehead diamond
      ctx.beginPath();
      ctx.moveTo(0, -35); ctx.lineTo(20, -15); ctx.lineTo(0, 5); ctx.lineTo(-20, -15);
      ctx.closePath();
      ctx.stroke();

      // Eyes
      if (progress > 0.75) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.globalAlpha *= 0.3;
        
        // Angry eye shape if firing or charging!
        if (activeLaser) {
          // Left angry eye
          ctx.beginPath(); ctx.moveTo(-58, -16); ctx.lineTo(-38, -28); ctx.lineTo(-22, -8); ctx.lineTo(-42, 6); ctx.closePath(); ctx.fill();
          // Right angry eye
          ctx.beginPath(); ctx.moveTo(58, -16); ctx.lineTo(38, -28); ctx.lineTo(22, -8); ctx.lineTo(42, 6); ctx.closePath(); ctx.fill();
        } else {
          // Normal eye
          ctx.beginPath(); ctx.moveTo(-55, -12); ctx.lineTo(-40, -28); ctx.lineTo(-25, -12); ctx.lineTo(-40, 4); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(55, -12); ctx.lineTo(40, -28); ctx.lineTo(25, -12); ctx.lineTo(40, 4); ctx.closePath(); ctx.fill();
        }
        ctx.restore();

        ctx.lineWidth = lineWidth * 1.5;
        if (activeLaser) {
          ctx.beginPath();
          ctx.moveTo(-58, -16); ctx.lineTo(-38, -28); ctx.lineTo(-22, -8); ctx.lineTo(-42, 6); ctx.closePath();
          ctx.moveTo(58, -16); ctx.lineTo(38, -28); ctx.lineTo(22, -8); ctx.lineTo(42, 6); ctx.closePath();
        } else {
          ctx.beginPath();
          ctx.moveTo(-55, -12); ctx.lineTo(-40, -28); ctx.lineTo(-25, -12); ctx.lineTo(-40, 4); ctx.closePath();
          ctx.moveTo(55, -12); ctx.lineTo(40, -28); ctx.lineTo(25, -12); ctx.lineTo(40, 4); ctx.closePath();
        }
        ctx.stroke();
      }
      ctx.restore();
    }

    // DRAW SLICE 3: Nose, Mouth, Whiskers
    if (progress > 0.6) {
      ctx.save();
      ctx.translate(bossX + offsetX + glitchX + s3, bossY);
      // Nose
      ctx.beginPath();
      ctx.moveTo(0, 8); ctx.lineTo(-10, 18); ctx.lineTo(10, 18);
      ctx.closePath();
      ctx.stroke();

      // Mouth - evil grin screaming if firing!
      ctx.beginPath();
      if (activeLaser && activeLaser.state === 'active') {
        ctx.moveTo(-25, 24); ctx.lineTo(0, 44); ctx.lineTo(25, 24); ctx.lineTo(12, 18); ctx.lineTo(-12, 18); ctx.closePath();
        ctx.fillStyle = 'rgba(255, 0, 85, 0.2)';
        ctx.fill();
      } else {
        ctx.moveTo(-25, 28); ctx.lineTo(-12, 36); ctx.lineTo(0, 28); ctx.lineTo(12, 36); ctx.lineTo(25, 28);
      }
      ctx.stroke();

      // Whiskers
      ctx.beginPath();
      ctx.moveTo(-85, 12); ctx.lineTo(-125, 5);
      ctx.moveTo(-85, 22); ctx.lineTo(-120, 22);
      ctx.moveTo(85, 12); ctx.lineTo(125, 5);
      ctx.moveTo(85, 22); ctx.lineTo(120, 22);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  };

  // Compile Progress Calculation
  let compileProg = 1.0;
  if (bossCinematic.state === 'drawing') {
    compileProg = Math.min(1.0, Math.max(0.0, (bossCinematic.timer - 0.8) / 1.6));
  }

  // Draw wireframe head in triple layers (glowing RGB outrun style)
  drawHead(-3, 'rgba(255, 0, 110, 0.4)', 1.5, 0, compileProg); 
  drawHead(3, 'rgba(0, 246, 255, 0.4)', 1.5, 0, compileProg);  
  drawHead(0, '#00ffff', 2.0, 15, compileProg);                

  // Concentric soundwave ripples during roar
  if (bossCinematic.state === 'roar') {
    ctx.save();
    const roarTime = bossCinematic.timer - 2.4; // time elapsed in roar
    ctx.strokeStyle = '#ff0055';
    ctx.shadowColor = '#ff0055';
    ctx.shadowBlur = 25;
    
    // Draw 3 expanding rings
    for (let i = 0; i < 3; i++) {
      const ringProg = (roarTime * 2.5 + i / 3) % 1.0;
      const radius = ringProg * 280;
      ctx.lineWidth = 4 * (1.0 - ringProg);
      ctx.globalAlpha = fade * (1.0 - ringProg) * 0.75;
      
      ctx.beginPath();
      ctx.arc(bossX, bossY + 28, radius, 0, 6.28);
      ctx.stroke();
      
      // Secondary cyan ring slightly offset
      ctx.strokeStyle = '#00ffff';
      ctx.shadowColor = '#00ffff';
      ctx.lineWidth = 2 * (1.0 - ringProg);
      ctx.beginPath();
      ctx.arc(bossX, bossY + 28, radius * 1.05, 0, 6.28);
      ctx.stroke();
      
      ctx.strokeStyle = '#ff0055';
      ctx.shadowColor = '#ff0055';
    }
    ctx.restore();
  }

  // 3. Draw Red Glowing digital Pupils
  if (compileProg > 0.8) {
    ctx.save();
    ctx.translate(bossX + glitchX, bossY);
    let pupilPulse = 3.5 + Math.sin(gTime * 25) * 1.5;
    if (activeLaser) pupilPulse = 6.0 + Math.sin(gTime * 40) * 2.5; // wider red glare if attacking!
    
    ctx.fillStyle = '#ff0055';
    ctx.shadowColor = '#ff0055';
    ctx.shadowBlur = activeLaser ? 24 : 12;
    ctx.beginPath();
    ctx.arc(-40, -12, pupilPulse, 0, 6.28);
    ctx.arc(40, -12, pupilPulse, 0, 6.28);
    ctx.fill();
    ctx.restore();
  }

  // 4. Moving CRT scanlines overlaying face
  ctx.save();
  ctx.translate(bossX + glitchX, bossY);
  ctx.strokeStyle = 'rgba(0, 255, 135, 0.2)';
  ctx.lineWidth = 1;
  const scanY = ((gTime * 90) % 220) - 110;
  if (scanY > -110 && scanY < 90) {
    ctx.beginPath();
    ctx.moveTo(-110, scanY);
    ctx.lineTo(110, scanY);
    ctx.stroke();
  }
  ctx.restore();

  // 5. HUD Diagnostic printouts on the left/right of the boss head
  if (compileProg > 0.4) {
    ctx.save();
    ctx.translate(bossX + glitchX, bossY);
    ctx.fillStyle = 'rgba(0, 246, 255, 0.75)';
    ctx.font = 'bold 9px monospace';
    
    // Left stats
    ctx.textAlign = 'left';
    ctx.fillText("BOSS: CYBER_CAT_v9.5", 130, -50);
    ctx.fillText(`THREAT: ${activeLaser ? "CRITICAL!!" : "EXTREME"}`, 130, -36);
    ctx.fillText(`ENERGY: ${~~(80 + Math.sin(gTime * 12) * 15)}%`, 130, -22);
    ctx.fillText(`DISSIPATION: ${~~(1200 + Math.cos(gTime * 5) * 200)}W`, 130, -8);
    
    // Sine audio graph mockup
    ctx.strokeStyle = 'rgba(0, 246, 255, 0.35)';
    ctx.lineWidth = 1.0;
    ctx.beginPath();
    for (let x = 0; x < 60; x += 3) {
      const yVal = Math.sin(x * 0.15 + gTime * 15) * (activeLaser ? 14 : 6) - 30;
      if (x === 0) ctx.moveTo(130 + x, yVal);
      else ctx.lineTo(130 + x, yVal);
    }
    ctx.stroke();

    // Right stats
    ctx.textAlign = 'right';
    ctx.fillText(`TARGET_LOCK: ${activeLaser ? "TRUE (100%)" : "TRUE (82%)"}`, -130, -50);
    ctx.fillText(`WEAPON_SYS: ${activeLaser ? "FIRING!!!" : "STANDBY"}`, -130, -36);
    ctx.fillText("SECTOR: ASCENSION", -130, -22);
    ctx.fillText(`HEX_DUMP: 0x${Math.floor(gTime*189).toString(16).toUpperCase()}`, -130, -8);
    
    // Symmetrical audio graph
    ctx.beginPath();
    for (let x = 0; x < 60; x += 3) {
      const yVal = Math.sin((60 - x) * 0.15 + gTime * 15) * (activeLaser ? 14 : 6) - 30;
      if (x === 0) ctx.moveTo(-130 - x, yVal);
      else ctx.lineTo(-130 - x, yVal);
    }
    ctx.stroke();
    
    ctx.restore();
  }

  // 6. Spawn charge particles suctioning into eyes during warning phase
  if (activeLaser && activeLaser.state === 'warning') {
    if (Math.random() < 0.28) {
      const isLeft = Math.random() < 0.5;
      const targetX = isLeft ? eyeLX : eyeRX;
      const targetY = eyeLY;
      const startAngle = Math.random() * 6.28;
      const startDist = 180 + Math.random() * 120;
      bossChargeParts.push({
        x: targetX + Math.cos(startAngle) * startDist,
        y: targetY + Math.sin(startAngle) * startDist,
        tx: targetX,
        ty: targetY,
        speed: 3.8 + Math.random() * 2.2,
        char: Math.random() < 0.55 ? (Math.random() < 0.5 ? '1' : '0') : 'x',
        color: Math.random() < 0.5 ? '#ff0055' : '#00ffff',
        size: 9 + Math.random() * 5
      });
    }
  }

  // Update and draw charge particles
  for (let i = bossChargeParts.length - 1; i >= 0; i--) {
    const p = bossChargeParts[i];
    p.x += (p.tx - p.x) * p.speed * dt;
    p.y += (p.ty - p.y) * p.speed * dt;
    
    ctx.save();
    ctx.fillStyle = p.color;
    ctx.font = `bold ${p.size}px monospace`;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillText(p.char, p.x, p.y);
    ctx.restore();

    // Check hit target
    const dx = p.tx - p.x;
    const dy = p.ty - p.y;
    if (Math.sqrt(dx*dx + dy*dy) < 6) {
      // Spawn tiny eye sparkles
      for (let j = 0; j < 4; j++) {
        const angle = Math.random() * 6.28;
        const sp = 45 + Math.random() * 85;
        const fx = fxPool.get();
        fx.x = p.tx;
        fx.y = p.ty;
        fx.vx = Math.cos(angle) * sp;
        fx.vy = Math.sin(angle) * sp;
        fx.s = 1.5 + Math.random() * 2;
        fx.a = 1.0;
        fx.l = 0.35;
        fx.c = p.color;
      }
      bossChargeParts.splice(i, 1);
    }
  }

  // 7. Cinematic Subtitles and Dialog update
  let currentSpeech = "";
  let newSpeakIdx = -1;

  if (bossCinematic.state === 'intro') {
    currentSpeech = "🚨 CONNEXION SYSTÈME... COMPILATION DE L'UNITÉ CENTRALE 🚨";
    newSpeakIdx = 100;
  } else if (bossCinematic.state === 'drawing') {
    currentSpeech = "CHARGEMENT DE LA MATRICE HOLOGRAPHIQUE FELINE.EXE (99%)";
    newSpeakIdx = 101;
  } else if (bossCinematic.state === 'roar') {
    currentSpeech = "🚨 COMPILATION REUSSIE. INTRUS DETECTE ! PROTOCOLE EXTERMINATION ! 🚨";
    newSpeakIdx = 102;
  } else if (activeLaser) {
    if (activeLaser.type === 'high') {
      currentSpeech = "⬇️ FAISCEAU SUPÉRIEUR CHARGÉ ! PROSTERNE-TOI OU SOIS DÉCAPITÉ ! ⬇️";
      newSpeakIdx = activeLaser.col * 2;
    } else {
      currentSpeech = "⬆️ ATTENTION AU SOL ! LE NEON SUPRÊME VA CHAUFFER TES PIEDS ! ⬆️";
      newSpeakIdx = activeLaser.col * 2 + 1;
    }
  } else {
    // Normal fight dialogues
    const pCol = Math.floor(P.x / TILE);
    if (pCol >= 442 && pCol < 460) {
      currentSpeech = "👾 PROTOCOLE ASCENSION ACTIF... SAUTE ET GLISSE, PETIT INSECTE ! 👾";
      newSpeakIdx = 1;
    } else if (pCol >= 460 && pCol < 480) {
      currentSpeech = "Analyse de tes réflexes... Résultat : Inférieur aux normes félines ! 🤖";
      newSpeakIdx = 2;
    } else if (pCol >= 480 && pCol < 500) {
      currentSpeech = "Tu penses pouvoir m'esquiver ? Mes bobines se rechargent ! ⚡";
      newSpeakIdx = 3;
    } else if (pCol >= 500 && pCol < 513) {
      currentSpeech = "⚠️ ERREUR SYSTÈME : DISSIPATION THERMIQUE DEPASSEE ! NON ! ⚠️";
      newSpeakIdx = 4;
    } else if (pCol >= 513) {
      currentSpeech = "💥 CODE INTERROMPU. DÉCONNEXION EN COURS. JE REVIENDRAI !!! 💥";
      newSpeakIdx = 5;
    }
  }

  if (newSpeakIdx !== bossSpeakIdx) {
    bossSpeech = currentSpeech;
    bossSpeechT = 0;
    bossSpeakIdx = newSpeakIdx;
  }
  bossSpeechT += dt;

  // 8. Draw black cinematic letterbox widescreen bars
  if (bossCinematic.widescreenPercent > 0) {
    ctx.save();
    ctx.fillStyle = '#05020c';
    const barH = 50 * bossCinematic.widescreenPercent;
    
    // Top bar
    ctx.fillRect(0, 0, w, barH);
    ctx.strokeStyle = '#ff0055';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#ff0055';
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(0, barH); ctx.lineTo(w, barH); ctx.stroke();
    
    // Bottom bar
    ctx.fillRect(0, h - barH, w, barH);
    ctx.beginPath(); ctx.moveTo(0, h - barH); ctx.lineTo(w, h - barH); ctx.stroke();
    
    // Alert label in top bar
    if (bossCinematic.widescreenPercent > 0.6) {
      ctx.fillStyle = Math.floor(gTime * 5) % 2 === 0 ? '#ff0055' : '#ffffff';
      ctx.font = '800 12px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText("🚨 ALERTE SYSTÈME : ANOMALIE CYBERNÉTIQUE DÉTECTÉE 🚨", w/2, barH / 2);
    }
    ctx.restore();
  }

  // 9. Draw compiling sweeps and diagnostic UI during the drawing phase
  if (bossCinematic.state === 'drawing') {
    const sweepY = bossY - 110 + compileProg * 190;
    ctx.save();
    ctx.strokeStyle = '#00ff87';
    ctx.lineWidth = 2.0;
    ctx.shadowColor = '#00ff87';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.moveTo(bossX - 150, sweepY);
    ctx.lineTo(bossX + 150, sweepY);
    ctx.stroke();
    
    ctx.strokeStyle = 'rgba(0, 255, 135, 0.08)';
    ctx.lineWidth = 1.0;
    ctx.shadowBlur = 0;
    for (let i = 0; i < 4; i++) {
      const lineY = sweepY - i * 16;
      if (lineY > bossY - 110) {
        ctx.beginPath(); ctx.moveTo(bossX - 150, lineY); ctx.lineTo(bossX + 150, lineY); ctx.stroke();
      }
    }
    ctx.restore();

    ctx.save();
    ctx.fillStyle = '#00ff87';
    ctx.font = '800 11px monospace';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#00ff87';
    ctx.shadowBlur = 8;
    ctx.fillText(`SCANNING OBJECT... COMPILING HOLOGRAPH: ${~~(compileProg * 100)}%`, bossX, bossY + 95);
    ctx.restore();
  }

  // 10. Draw Outrun Speech bubble / typewriter dialog
  if (bossSpeech && bossSpeechT > 0 && bossSpeechT < 5.0) {
    const bubbleW = w * 0.76;
    const bubbleH = 50;
    const bubbleX = (w - bubbleW) / 2;
    const bubbleY = h - 55 - (bossCinematic.widescreenPercent * 15); // Adjust height based on cinematic bars
    
    ctx.save();
    // Glass body
    ctx.fillStyle = 'rgba(10, 5, 20, 0.82)';
    ctx.beginPath(); ctx.roundRect(bubbleX, bubbleY, bubbleW, bubbleH, 8); ctx.fill();
    
    // Outrun glowing pink outline
    ctx.strokeStyle = '#ff2a6d';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#ff2a6d';
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.roundRect(bubbleX, bubbleY, bubbleW, bubbleH, 8); ctx.stroke();
    
    // Glowing cyan accent corners
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    // Top-left corner
    ctx.moveTo(bubbleX, bubbleY + 12); ctx.lineTo(bubbleX, bubbleY); ctx.lineTo(bubbleX + 12, bubbleY);
    // Bottom-right corner
    ctx.moveTo(bubbleX + bubbleW - 12, bubbleY + bubbleH); ctx.lineTo(bubbleX + bubbleW, bubbleY + bubbleH); ctx.lineTo(bubbleX + bubbleW, bubbleY + bubbleH - 12);
    ctx.stroke();
    ctx.shadowBlur = 0;
    
    // Text rendering with typewriter slice
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    // Flashing Cyber-Cat name tag
    ctx.fillStyle = '#ffdd00';
    ctx.font = '900 11px monospace';
    ctx.fillText("🤖 HOLOGRAPHE UNITÉ CENTRALE (CYBER-CAT) :", w / 2, bubbleY + 15);
    
    // Sliced dialogue text
    let displayChars = Math.min(bossSpeech.length, Math.floor(bossSpeechT * 26));
    let textToShow = bossSpeech.substring(0, displayChars);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'italic 13px "Segoe UI", sans-serif';
    ctx.fillText(`"${textToShow}"`, w / 2, bubbleY + 34);
    ctx.restore();
  }

  ctx.restore();
}

function drawBossLasers() {
  if (state === 'multiplayerSandbox') return;
  if (P.x < 442 * TILE) return;
  const w = W(), h = H(), gy = groundY();
  
  const floatY = Math.sin(gTime * 2.0) * 12;
  const bossX = w / 2;
  const bossY = h * 0.35 + floatY;
  let glitchX = 0;
  if (Math.random() < 0.15) glitchX = (Math.random() - 0.5) * 16;
  
  const eyeLX = bossX - 40 + glitchX;
  const eyeLY = bossY - 12;
  const eyeRX = bossX + 40 + glitchX;
  const eyeRY = bossY - 12;
  
  for (const laser of bossLasers) {
    if (laser.state === 'inactive' || laser.state === 'fired') continue;
    
    const lx = laser.col * TILE - camX;
    const midX = lx + TILE/2;
    
    if (laser.state === 'warning') {
      // 1. Blinking warning light beam
      ctx.save();
      const pulse = 0.10 + Math.sin(gTime * 24) * 0.07;
      ctx.fillStyle = `rgba(255, 0, 85, ${pulse})`;
      ctx.fillRect(lx, CEILING_Y, TILE, gy - CEILING_Y);
      
      ctx.strokeStyle = '#ff0055';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(lx, CEILING_Y); ctx.lineTo(lx, gy);
      ctx.moveTo(lx + TILE, CEILING_Y); ctx.lineTo(lx + TILE, gy);
      ctx.stroke();
      ctx.restore();
      
      // 2. Targeting lasers from the eyes
      ctx.save();
      ctx.strokeStyle = `rgba(255, 0, 85, ${0.45 + Math.sin(gTime * 20) * 0.25})`;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(eyeLX, eyeLY);
      ctx.lineTo(midX, CEILING_Y);
      ctx.moveTo(eyeRX, eyeRY);
      ctx.lineTo(midX, CEILING_Y);
      ctx.stroke();
      ctx.restore();
      
      // 3. Cyber radar target crosshair reticle zooming and locking in
      const warnPct = Math.min(1.0, laser.timer / 0.7);
      const reticleR = 64 * (1.0 - warnPct * 0.8) + 12;
      const targetY = (laser.type === 'high') ? (gy - 16) : (gy - 60);
      
      ctx.save();
      ctx.translate(midX, targetY);
      
      // Outer primary rotating scope
      ctx.save();
      ctx.rotate(gTime * 3.5);
      ctx.strokeStyle = '#ff0055';
      ctx.lineWidth = 2.0;
      ctx.shadowColor = '#ff0055';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(0, 0, reticleR, 0, 6.28);
      ctx.stroke();
      
      // Dotted crosshairs
      ctx.beginPath();
      ctx.moveTo(-reticleR - 8, 0); ctx.lineTo(-reticleR + 3, 0);
      ctx.moveTo(reticleR - 3, 0); ctx.lineTo(reticleR + 8, 0);
      ctx.moveTo(0, -reticleR - 8); ctx.lineTo(0, -reticleR + 3);
      ctx.moveTo(0, reticleR - 3); ctx.lineTo(0, reticleR + 8);
      ctx.stroke();
      ctx.restore();
      
      // Inner secondary counter-rotating dotted ring
      ctx.save();
      ctx.rotate(-gTime * 5.5);
      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth = 1.0;
      ctx.shadowColor = '#00ffff';
      ctx.shadowBlur = 6;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(0, 0, reticleR * 0.65, 0, 6.28);
      ctx.stroke();
      ctx.restore();
      
      // Cyber corner locking brackets
      ctx.strokeStyle = '#ff0055';
      ctx.lineWidth = 1.5;
      ctx.shadowBlur = 0;
      const bSize = reticleR + 6;
      // Top-Left bracket
      ctx.beginPath(); ctx.moveTo(-bSize, -bSize + 8); ctx.lineTo(-bSize, -bSize); ctx.lineTo(-bSize + 8, -bSize); ctx.stroke();
      // Top-Right bracket
      ctx.beginPath(); ctx.moveTo(bSize, -bSize + 8); ctx.lineTo(bSize, -bSize); ctx.lineTo(bSize - 8, -bSize); ctx.stroke();
      // Bottom-Left bracket
      ctx.beginPath(); ctx.moveTo(-bSize, bSize - 8); ctx.lineTo(-bSize, bSize); ctx.lineTo(-bSize + 8, bSize); ctx.stroke();
      // Bottom-Right bracket
      ctx.beginPath(); ctx.moveTo(bSize, bSize - 8); ctx.lineTo(bSize, bSize); ctx.lineTo(bSize - 8, bSize); ctx.stroke();
      
      // Lock percentage text
      ctx.fillStyle = '#00ffff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const pctVal = ~~(warnPct * 100);
      ctx.fillText(`LOCK: ${pctVal}%`, 0, -reticleR - 16);
      
      ctx.restore();
      
      // 4. Warning alert triangle signs
      ctx.save();
      ctx.translate(midX, CEILING_Y + 50 + Math.sin(gTime * 12) * 3);
      
      ctx.shadowColor = '#ff2a6d';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#ff2a6d';
      ctx.beginPath();
      ctx.moveTo(0, -18);
      ctx.lineTo(18, 12);
      ctx.lineTo(-18, 12);
      ctx.closePath();
      ctx.fill();
      
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('!', 0, 6);
      
      ctx.font = '800 11px "Segoe UI", sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.shadowBlur = 0;
      if (laser.type === 'high') {
        ctx.fillText('🚨 GLISSER ! 🚨', 0, 24);
      } else {
        ctx.fillText('🚨 SAUTER ! 🚨', 0, 24);
      }
      ctx.restore();
    }
    
    if (laser.state === 'active') {
      // 1. Draw solid eye lasers charging down
      ctx.save();
      ctx.strokeStyle = '#ff0055';
      ctx.lineWidth = 5;
      ctx.shadowColor = '#ff0055';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.moveTo(eyeLX, eyeLY);
      ctx.lineTo(midX, CEILING_Y);
      ctx.moveTo(eyeRX, eyeRY);
      ctx.lineTo(midX, CEILING_Y);
      ctx.stroke();
      
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2.0;
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(eyeLX, eyeLY);
      ctx.lineTo(midX, CEILING_Y);
      ctx.moveTo(eyeRX, eyeRY);
      ctx.lineTo(midX, CEILING_Y);
      ctx.stroke();
      ctx.restore();
      
      ctx.save();
      const startY = CEILING_Y;
      const endY = (laser.type === 'high') ? (gy - 36) : gy;
      
      // 2. High-power outer blast beam
      ctx.globalAlpha = 0.95;
      ctx.strokeStyle = '#ff0055';
      ctx.lineWidth = 32;
      ctx.shadowColor = '#ff0055';
      ctx.shadowBlur = 30;
      ctx.beginPath();
      ctx.moveTo(midX, startY); ctx.lineTo(midX, endY);
      ctx.stroke();
      
      // Mid hot envelope
      ctx.strokeStyle = '#ff66bb';
      ctx.lineWidth = 16;
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(midX, startY); ctx.lineTo(midX, endY);
      ctx.stroke();
      
      // White-hot plasma core
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(midX, startY); ctx.lineTo(midX, endY);
      ctx.stroke();
      ctx.restore();

      // 3. Crackling lightning arcs crawling down the sides of the laser column!
      if (Math.random() < 0.75) {
        drawLightning(midX - 4 + (Math.random() - 0.5) * 6, startY, midX - 4 + (Math.random() - 0.5) * 6, endY, 6, 12, '#ff00aa', 2.0);
        drawLightning(midX + 4 + (Math.random() - 0.5) * 6, startY, midX + 4 + (Math.random() - 0.5) * 6, endY, 6, 12, '#00ffff', 2.0);
      }

      // 4. Glowing ellipses sliding vertically down the beam to represent energy pulses
      const ringCount = 3;
      for (let i = 0; i < ringCount; i++) {
        const progress = ((gTime * 3.2 + i / ringCount) % 1.0);
        const ry = startY + progress * (endY - startY);
        ctx.save();
        ctx.strokeStyle = i % 2 === 0 ? '#00ffff' : '#ff0055';
        ctx.lineWidth = 2.2;
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.ellipse(midX, ry, 18 * (1.0 - progress * 0.3), 4.5, 0, 0, 6.28);
        ctx.stroke();
        ctx.restore();
      }

      // 5. High-voltage ground impact splash particles!
      if (Math.random() < 0.7) {
        for (let j = 0; j < 3; j++) {
          const p = fxPool.get();
          p.x = midX;
          p.y = endY;
          p.vx = (Math.random() - 0.5) * 280;
          p.vy = -Math.random() * 140 - 60;
          p.s = 2.0 + Math.random() * 3.5;
          p.a = 1.0;
          p.l = 0.30 + Math.random() * 0.25;
          p.c = Math.random() < 0.5 ? '#ff0055' : '#00ffff';
        }
      }
    }
  }
}

// === LOOP ===
function drawTimeWarpFX() {
  if (timeWarpTimer <= 0) return;
  const w = W(), h = H();
  ctx.save();

  const pulse = Math.sin(gTime * 12) * 0.08 + 0.35;
  const vig = ctx.createRadialGradient(w/2, h/2, h * 0.3, w/2, h/2, h * 0.85);
  vig.addColorStop(0, 'rgba(0, 0, 0, 0)');
  vig.addColorStop(0.6, `rgba(147, 51, 234, ${pulse * 0.4})`);
  vig.addColorStop(1, `rgba(88, 28, 135, ${pulse})`);
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, w, h);

  ctx.strokeStyle = 'rgba(168, 85, 247, 0.12)';
  ctx.lineWidth = 1.5;
  const gridSpacing = 40;
  const waveAmp = 12;
  const waveFreq = 0.015;

  for (let y = gridSpacing; y < h; y += gridSpacing) {
    ctx.beginPath();
    for (let x = 0; x <= w; x += 15) {
      const dy = Math.sin(x * waveFreq + gTime * 8) * waveAmp;
      if (x === 0) ctx.moveTo(x, y + dy);
      else ctx.lineTo(x, y + dy);
    }
    ctx.stroke();
  }

  for (let x = gridSpacing; x < w; x += gridSpacing) {
    ctx.beginPath();
    for (let y = 0; y <= h; y += 15) {
      const dx = Math.cos(y * waveFreq + gTime * 8) * waveAmp;
      if (y === 0) ctx.moveTo(x + dx, y);
      else ctx.lineTo(x + dx, y);
    }
    ctx.stroke();
  }

  const glyphs = ['XII', 'III', 'VI', 'IX', '⏳', '⏰', '⌛', '12', '3', '6', '9'];
  ctx.fillStyle = 'rgba(168, 85, 247, 0.4)';
  ctx.font = 'bold 20px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  for (let i = 0; i < 10; i++) {
    const seed = i * 73.5;
    const x = ((seed + gTime * 45) % (w + 100)) - 50;
    const yTarget = (seed * 1.7) % h;
    const y = yTarget + Math.sin(gTime * 2 + seed) * 30;
    const alpha = (0.2 + Math.sin(gTime + seed) * 0.1) * (1 - Math.abs(x - w/2) / (w/2));
    if (alpha > 0) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = i % 2 === 0 ? '#c084fc' : '#22d3ee';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 10;
      const glyph = glyphs[Math.floor((seed) % glyphs.length)];
      ctx.fillText(glyph, x, y);
      ctx.restore();
    }
  }

  // Matrix digital rain columns
  const cols = 24;
  ctx.save();
  ctx.font = 'bold 12px "Courier New", monospace';
  ctx.textAlign = 'center';
  for (let i = 0; i < cols; i++) {
    const colX = (i * w / cols) + (Math.sin(i * 13) * 10);
    const speed = 160 + (Math.sin(i * 3) * 80);
    const startY = (gTime * speed + (i * 257)) % (h + 120) - 60;
    
    for (let j = 0; j < 6; j++) {
      const charY = startY - (j * 15);
      if (charY < 0 || charY > h) continue;
      
      const alpha = (1.0 - (j / 6)) * 0.22 * (timeWarpTimer / 0.8);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = j === 0 ? '#ffffff' : (i % 2 === 0 ? '#00ff87' : '#00c9ff');
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = j === 0 ? 8 : 2;
      
      const charCode = 48 + ((Math.floor(gTime * 10 + i * 7 + j) % 10)); // numbers 0-9
      const char = String.fromCharCode(charCode);
      ctx.fillText(char, colX, charY);
      ctx.restore();
    }
  }
  ctx.restore();

  const bannerPulse = Math.sin(gTime * 15) * 0.15 + 0.85;
  ctx.save();
  ctx.translate(w/2, h * 0.15);
  ctx.scale(bannerPulse, bannerPulse);
  ctx.textAlign = 'center';
  
  ctx.font = 'bold 28px "Segoe UI", sans-serif';
  ctx.shadowColor = '#d946ef';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#f472b6';
  ctx.fillText('⚡ MATRIX TIME WARP ⚡', 0, 0);
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffffff';
  ctx.fillText('⚡ MATRIX TIME WARP ⚡', 0, 0);
  
  ctx.shadowBlur = 0;
  ctx.font = '800 11px "Segoe UI", sans-serif';
  ctx.fillStyle = '#a855f7';
  ctx.fillText('TEMPS RALENTI : 0.22x', 0, 20);
  
  ctx.restore();
  ctx.restore();
}

// === LOOP ===
function loop(ts){
  const dt=lastT?(ts-lastT)/1000:1/60;lastT=ts;update(dt);
  ctx.save();ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.restore();
  const w=W(),h=H();
  ctx.save();
  ctx.translate(offsetX,offsetY);
  ctx.scale(scale,scale);
  ctx.save();ctx.translate(shake.x,shake.y);
  if(gravAnim>0){ctx.translate(w/2,h/2);ctx.rotate(Math.sin(gravAnim*3.14)*.06);ctx.translate(-w/2,-h/2);}
  
  // Calculate Matrix Time-Warp Zoom & Tilt + Boss Cinematic Camera
  let currentZoom = 1.0;
  let camTilt = 0;
  if(timeWarpTimer > 0) {
    const tRatio = timeWarpTimer / 0.8;
    currentZoom = 1.0 + Math.sin(tRatio * Math.PI) * 0.28;
    camTilt = Math.sin(tRatio * Math.PI) * 0.035;
  }
  
  let finalZoom = currentZoom * bossCam.zoom;
  let finalYOffset = bossCam.yOffset;
  let finalXOffset = 0;
  if(state === 'introCinematic') {
    finalZoom = introCam.zoom;
    finalYOffset = introCam.yOffset;
    finalXOffset = introCam.xOffset;
    camTilt = introCam.tilt;
  }
  
  ctx.save();
  if(finalZoom !== 1.0 || finalYOffset !== 0 || finalXOffset !== 0 || camTilt !== 0) {
    let px = P.x - camX + P.w/2;
    let py = P.y + P.h/2;
    
    // Smoothly shift camera target from player to boss during cinematic camera zoom
    if (bossCam.zoom > 1.0 && bossCinematic.state !== 'inactive') {
      const mixRatio = Math.min(1.0, (bossCam.zoom - 1.0) / 0.45);
      px = px * (1 - mixRatio) + (w / 2) * mixRatio;
      py = py * (1 - mixRatio) + (h * 0.35) * mixRatio;
    }
    
    ctx.translate(px, py);
    ctx.scale(finalZoom, finalZoom);
    if(camTilt !== 0) ctx.rotate(camTilt);
    ctx.translate(-px - finalXOffset / finalZoom, -py - finalYOffset / finalZoom);
  }
  
  drawBG();
  if(state==='play'||state==='dead')drawSpdLines();
  drawCyberBoss();
  drawGround();
  drawObs();
  drawTrail();
  drawPart();
  drawBossLasers();
  if(state==='play'||state==='countdown'||(state==='introCinematic' && introCinematicTimer >= 2.8)) drawPlayer();
  if(state==='multiplayerSandbox') {
    drawRemotePlayers(); // FIRST draw others
    drawPlayer();        // THEN draw local player on top!
    
    ctx.save();
    ctx.fillStyle = '#00ff87';
    ctx.shadowColor = C.c1;
    ctx.shadowBlur = 8;
    ctx.font = 'bold 11px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    let px = P.x - camX + P.w / 2;
    let py = P.y - 8;
    ctx.fillText(mp.nickname + ' (Vous)', px, py);
    
    // Draw local player chat bubble
    if (mp.myChatMsg) {
      let timeLeft = mp.myChatMsg.expires - Date.now();
      if (timeLeft > 0) {
        let alpha = timeLeft < 500 ? timeLeft / 500 : 1;
        drawChatBubble(ctx, mp.myChatMsg.text, px, py - 14, '#00ff87', alpha);
      }
    }
    
    ctx.restore();
  }
  
  ctx.restore();
  
  if(state==='play'){
    drawHUD();
    drawSecTitle();
    drawCat();
    drawIntro();
    drawSlideWarning();
  }
  if(state==='countdown'){
    drawCD();
  }
  if(state==='introCinematic'){
    drawIntroCinematicUI();
  }
  
  drawTimeWarpFX();
  drawScreenShockwaves();
  drawFlash();
  if(state==='dead'){
    drawPart();
    drawDeath();
    drawHUD();
  }
  if(state==='menu')drawMenu();
  if(state==='win'){drawPart();drawWin();}
  
  ctx.restore();
  if(offsetY>0||offsetX>0){
    ctx.save();ctx.strokeStyle=C.c1;ctx.lineWidth=4;ctx.shadowColor=C.c1;ctx.shadowBlur=15;
    ctx.strokeRect(0,0,w,h);ctx.restore();
  }
  ctx.restore();
  
  const isMobile = IS_MOBILE || window.innerWidth < 960;
  if(state==='menu' && isMobile && !document.fullscreenElement && !document.webkitFullscreenElement){
    if(fsBtn.style.display!=='block') fsBtn.style.display='block';
  } else {
    if(fsBtn.style.display!=='none') fsBtn.style.display='none';
  }

  requestAnimationFrame(loop);
}

// === MULTIPLAYER NETWORKING & PHYSICS INTEGRATION ===
let lobbyHeartbeatInterval = null;
let lobbyPruningInterval = null;

function connectMQTT() {
  if (mp.client) return;
  mp.state = 'connecting';
  
  const broker = 'wss://broker.emqx.io:8084/mqtt';
  mp.client = mqtt.connect(broker, {
    clientId: mp.myId,
    clean: true,
    connectTimeout: 5000,
    reconnectPeriod: 2000
  });
  
  mp.client.on('connect', () => {
    mp.state = 'lobby';
    mp.client.subscribe('neon-rush/lobby/worlds/+', { qos: 0 });
    addChatSystemMessage("📡 Connecté avec succès au réseau Neon Rush !");
  });
  
  mp.client.on('message', (topic, message) => {
    const payloadStr = message.toString();
    
    // Global Lobby updates: neon-rush/lobby/worlds/<worldId>
    if (topic.startsWith('neon-rush/lobby/worlds/')) {
      const worldId = topic.substring('neon-rush/lobby/worlds/'.length);
      if (!payloadStr) {
        delete mp.activeWorlds[worldId];
      } else {
        try {
          const room = JSON.parse(payloadStr);
          mp.activeWorlds[worldId] = room;
        } catch (e) {}
      }
      updateWorldsListUI();
      return;
    }
    
    // In-world updates
    if (mp.currentWorld) {
      // Players coordinates: neon-rush/worlds/<worldId>/players/<playerId>
      const playerPrefix = `neon-rush/worlds/${mp.currentWorld.id}/players/`;
      if (topic.startsWith(playerPrefix)) {
        const playerId = topic.substring(playerPrefix.length);
        if (playerId === mp.myId) return;
        
        if (!payloadStr) {
          delete mp.players[playerId];
        } else {
          try {
            const data = JSON.parse(payloadStr);
            const absoluteY = data.y + groundY();
            if (!mp.players[playerId]) {
              mp.players[playerId] = { rx: data.x, ry: absoluteY };
              addChatSystemMessage(`👋 ${data.n || data.nickname} a rejoint le monde !`);
              
              // If we just joined the room, teleport to the first player we see so we aren't lost at spawn
              if (mp.justJoined) {
                P.x = data.x;
                P.y = absoluteY - P.h;
                sandboxP.vx = 0;
                camX = Math.max(0, P.x - W() / 2);
                mp.justJoined = false;
                addChatSystemMessage(`🚀 Téléportation vers ${data.n || data.nickname} !`);
              }
            }
            mp.players[playerId].x = data.x;
            mp.players[playerId].y = absoluteY;
            mp.players[playerId].rot = data.r !== undefined ? data.r : data.rot;
            mp.players[playerId].sliding = data.s !== undefined ? !!data.s : data.sliding;
            mp.players[playerId].color1 = data.c1 || data.color1;
            mp.players[playerId].color2 = data.c2 || data.color2;
            mp.players[playerId].nickname = data.n || data.nickname;
            mp.players[playerId].lastUpdate = Date.now();
          } catch (e) {}
        }
        return;
      }
      
      // Chat message: neon-rush/worlds/<worldId>/chat
      const chatTopic = `neon-rush/worlds/${mp.currentWorld.id}/chat`;
      if (topic === chatTopic) {
        try {
          const chat = JSON.parse(payloadStr);
          if (chat.senderId === mp.myId) return; // Already handled locally
          
          addChatUserMessage(chat.sender, chat.text);
          // Set chat bubble for the sender
          const expiration = Date.now() + 5000;
          
          if (chat.senderId && mp.players[chat.senderId]) {
             mp.players[chat.senderId].chatMsg = { text: chat.text, expires: expiration };
          } else {
            // Fallback for older clients
            for (const id in mp.players) {
              if (mp.players[id].nickname === chat.sender) {
                mp.players[id].chatMsg = { text: chat.text, expires: expiration };
                break;
              }
            }
          }
          
          // Track in local history
          mp.chatHistory.push({ sender: chat.sender, text: chat.text, t: Date.now() });
          if (mp.chatHistory.length > 30) mp.chatHistory.shift();
        } catch (e) {}
        return;
      }
      
      // Chat history (retained): neon-rush/worlds/<worldId>/chat-history
      const histTopic = `neon-rush/worlds/${mp.currentWorld.id}/chat-history`;
      if (topic === histTopic) {
        if (!mp.chatHistoryLoaded) {
          mp.chatHistoryLoaded = true;
          try {
            const hist = JSON.parse(payloadStr);
            if (Array.isArray(hist)) {
              for (const msg of hist) {
                addChatUserMessage(msg.sender, msg.text);
              }
              mp.chatHistory = hist.slice();
            }
          } catch (e) {}
        }
        return;
      }
    }
  });
  
  mp.client.on('error', () => {
    mp.state = 'offline';
    addChatSystemMessage("❌ Erreur de connexion au serveur de salon.");
  });
  
  mp.client.on('close', () => {
    mp.state = 'offline';
  });
}

function startLobbyPublisher() {
  if (lobbyHeartbeatInterval) clearInterval(lobbyHeartbeatInterval);
  if (lobbyPruningInterval) clearInterval(lobbyPruningInterval);
  
  // Host heartbeats published to global lobby every 2s
  lobbyHeartbeatInterval = setInterval(() => {
    if (mp.client && mp.currentWorld && mp.currentWorld.hostId === mp.myId) {
      const topic = `neon-rush/lobby/worlds/${mp.currentWorld.id}`;
      const payload = JSON.stringify({
        id: mp.currentWorld.id,
        name: mp.currentWorld.name,
        host: mp.nickname,
        playersCount: Object.keys(mp.players).length + 1,
        lastActive: Date.now()
      });
      mp.client.publish(topic, payload, { qos: 0, retain: true });
    }
  }, 2000);
  
  // Inactive players timeout pruning
  lobbyPruningInterval = setInterval(() => {
    const now = Date.now();
    if (state === 'multiplayerSandbox') {
      for (const id in mp.players) {
        if (now - mp.players[id].lastUpdate > 12000) {
          addChatSystemMessage(`💀 ${mp.players[id].nickname} est parti (déconnexion)`);
          delete mp.players[id];
        }
      }
    }
    
    // Prune stale rooms in listing UI
    for (const wid in mp.activeWorlds) {
      if (now - mp.activeWorlds[wid].lastActive > 6000) {
        delete mp.activeWorlds[wid];
      }
    }
    updateWorldsListUI();
  }, 3000);
}

function updateWorldsListUI() {
  const container = document.getElementById('mpWorldsList');
  if (!container) return;
  
  const wKeys = Object.keys(mp.activeWorlds);
  if (wKeys.length === 0) {
    container.innerHTML = `<div style="text-align:center; color:#777; font-size:13px; margin-top:60px;">Aucun salon actif détecté. Créez-en un !</div>`;
    return;
  }
  
  let html = '';
  for (const wid of wKeys) {
    const room = mp.activeWorlds[wid];
    html += `
      <div class="mp-world-item">
        <div>
          <div style="font-weight:800; font-size:14px; color:#00ff87;">🌍 ${room.name}</div>
          <div style="font-size:11px; color:#aaa; margin-top:4px;">Hôte : ${room.host}</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <span style="font-size:12px; font-weight:700; color:#00c9ff;">👥 ${room.playersCount}</span>
          <button class="mp-join-btn" onclick="joinWorld('${room.id}', '${room.name.replace(/'/g, "\\'")}', '${room.host.replace(/'/g, "\\'")}')">Entrer</button>
        </div>
      </div>
    `;
  }
  container.innerHTML = html;
}

function joinWorld(id, name, host) {
  const nickInput = document.getElementById('mpNick').value.trim();
  if (nickInput) {
    mp.nickname = nickInput;
  }
  
  mp.currentWorld = {
    id: id,
    name: name,
    host: host,
    hostId: host === mp.nickname ? mp.myId : null
  };
  
  mp.players = {};
  mp.chatHistory = [];
  mp.chatHistoryLoaded = false;
  mp.justJoined = (host !== mp.nickname);
  state = 'multiplayerSandbox';
  
  // Position flat on floor
  P.x = 100;
  P.y = groundY() - P.h;
  P.vy = 0;
  sandboxP.vx = 0;
  sandboxP.keys.left = false;
  sandboxP.keys.right = false;
  sandboxP.keys.jump = false;
  
  connectMQTT();
  
  const sub = () => {
    if (mp.client && mp.client.connected) {
      mp.client.subscribe(`neon-rush/worlds/${id}/players/+`, { qos: 0 });
      mp.client.subscribe(`neon-rush/worlds/${id}/chat`, { qos: 0 });
      mp.client.subscribe(`neon-rush/worlds/${id}/chat-history`, { qos: 0 });
      
      startLobbyPublisher();
      publishPosition();
      
      addChatSystemMessage(`🚀 Monde rejoint : ${name}`);
      addChatSystemMessage("💡 Appuyez sur Entrée ou / pour chater !");
    } else {
      setTimeout(sub, 250);
    }
  };
  sub();
  
  document.getElementById('mpLobby').style.display = 'none';
  document.getElementById('chatContainer').style.display = 'block';
  document.getElementById('mpQuitBtn').style.display = 'block';
}

function leaveCurrentWorld() {
  if (!mp.currentWorld) return;
  
  if (mp.client) {
    const playerTopic = `neon-rush/worlds/${mp.currentWorld.id}/players/${mp.myId}`;
    mp.client.publish(playerTopic, '', { qos: 0, retain: true });
    
    mp.client.unsubscribe(`neon-rush/worlds/${mp.currentWorld.id}/players/+`);
    mp.client.unsubscribe(`neon-rush/worlds/${mp.currentWorld.id}/chat`);
    
    if (mp.currentWorld.hostId === mp.myId) {
      const lobbyTopic = `neon-rush/lobby/worlds/${mp.currentWorld.id}`;
      mp.client.publish(lobbyTopic, '', { qos: 0, retain: true });
    }
  }
  
  if (lobbyHeartbeatInterval) clearInterval(lobbyHeartbeatInterval);
  if (lobbyPruningInterval) clearInterval(lobbyPruningInterval);
  lobbyHeartbeatInterval = null;
  lobbyPruningInterval = null;
  
  mp.currentWorld = null;
  mp.players = {};
  
  document.getElementById('chatContainer').style.display = 'none';
  document.getElementById('mpQuitBtn').style.display = 'none';
  document.getElementById('menuMpBtnOverlay').style.display = 'flex';
  
  state = 'menu';
  camX = 0;
  progress = 0;
  startMusic();
}

function openChat() {
  if (chatActive) return;
  chatActive = true;
  const input = document.getElementById('chatInput');
  input.style.display = 'block';
  input.focus();
}

function closeChat() {
  if (!chatActive) return;
  chatActive = false;
  const input = document.getElementById('chatInput');
  input.value = '';
  input.style.display = 'none';
  canvas.focus();
}

function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (text && mp.client && mp.currentWorld) {
    const topic = `neon-rush/worlds/${mp.currentWorld.id}/chat`;
    const payload = JSON.stringify({
      sender: mp.nickname,
      senderId: mp.myId,
      text: text
    });
    mp.client.publish(topic, payload, { qos: 0, retain: false });
    
    // Local display
    addChatUserMessage(mp.nickname, text);
    
    // Set local chat bubble immediately
    mp.myChatMsg = { text: text, expires: Date.now() + 5000 };
    
    // Update retained chat history for new joiners
    mp.chatHistory.push({ sender: mp.nickname, text: text, t: Date.now() });
    if (mp.chatHistory.length > 30) mp.chatHistory.shift();
    const histTopic = `neon-rush/worlds/${mp.currentWorld.id}/chat-history`;
    mp.client.publish(histTopic, JSON.stringify(mp.chatHistory), { qos: 0, retain: true });
  }
  closeChat();
}

function addChatUserMessage(sender, text) {
  const history = document.getElementById('chatHistory');
  if (!history) return;
  
  const div = document.createElement('div');
  div.style.marginBottom = '4px';
  const isMe = sender === mp.nickname;
  const color = isMe ? '#00ff87' : '#ff0055';
  const nameLabel = isMe ? `${sender} (Vous)` : sender;
  
  div.innerHTML = `<span style="color:${color}; font-weight:900; text-shadow:0 0 4px ${color};">[${nameLabel}]:</span> <span style="color:#ffffff;">${text}</span>`;
  history.appendChild(div);
  
  while (history.children.length > 40) {
    history.removeChild(history.firstChild);
  }
  history.scrollTop = history.scrollHeight;
}

function addChatSystemMessage(text) {
  const history = document.getElementById('chatHistory');
  if (!history) return;
  
  const div = document.createElement('div');
  div.style.marginBottom = '4px';
  div.innerHTML = `<span style="color:#00ffff; font-style:italic; font-weight:bold; text-shadow:0 0 4px #00ffff;">⚡ [SYSTÈME]: ${text}</span>`;
  history.appendChild(div);
  
  while (history.children.length > 40) {
    history.removeChild(history.firstChild);
  }
  history.scrollTop = history.scrollHeight;
}

function publishPosition() {
  if (mp.client && mp.currentWorld) {
    const topic = `neon-rush/worlds/${mp.currentWorld.id}/players/${mp.myId}`;
    const payload = JSON.stringify({
      x: Math.round(P.x),
      y: Math.round(P.y - groundY()),
      r: Number(P.rot.toFixed(2)),
      s: P.sliding ? 1 : 0,
      c1: mp.myColors.c1,
      c2: mp.myColors.c2,
      n: mp.nickname
    });
    mp.client.publish(topic, payload, { qos: 0, retain: false });
  }
}

function updateSandbox(dt) {
  gTime += dt;
  
  // Smooth camera following
  const targetCamX = Math.max(0, P.x - W() / 2);
  camX += (targetCamX - camX) * 8 * dt;
  if (Math.abs(camX - targetCamX) < 1) camX = targetCamX;
  
  const gy = groundY();
  
  // Horizontal movement acceleration/friction
  if (sandboxP.keys.left) {
    sandboxP.vx -= sandboxP.accel * dt;
    if (sandboxP.vx < -sandboxP.maxSpeed) sandboxP.vx = -sandboxP.maxSpeed;
  } else if (sandboxP.keys.right) {
    sandboxP.vx += sandboxP.accel * dt;
    if (sandboxP.vx > sandboxP.maxSpeed) sandboxP.vx = sandboxP.maxSpeed;
  } else {
    if (sandboxP.vx > 0) {
      sandboxP.vx -= sandboxP.friction * dt;
      if (sandboxP.vx < 0) sandboxP.vx = 0;
    } else if (sandboxP.vx < 0) {
      sandboxP.vx += sandboxP.friction * dt;
      if (sandboxP.vx > 0) sandboxP.vx = 0;
    }
  }
  
  P.x += sandboxP.vx * dt;
  if (P.x < 100) { P.x = 100; sandboxP.vx = 0; }
  
  // Vertical gravity & jumping
  P.vy += GRAVITY * dt;
  if (sandboxP.keys.jump && P.onG) {
    P.vy = JUMP_VEL;
    P.onG = false;
    spJump(P.x - camX + P.w/2, P.y + P.h);
  }
  
  P.y += P.vy * dt;
  P.onG = false;
  
  // Floor collision (sandbox flat checkered plaine)
  if (P.y + P.h >= gy) {
    P.y = gy - P.h;
    P.vy = 0;
    P.onG = true;
  }
  
  // Premium aesthetic rotations
  if (P.onG) {
    P.sq += (1 - P.sq) * 12 * dt;
    P.st += (1 - P.st) * 12 * dt;
    P.rot = 0; P.tRot = 0;
  } else {
    P.rot += 340 * dt;
    const vn = Math.abs(P.vy) / 820;
    P.st = 1 + vn * 0.15;
    P.sq = 1 - vn * 0.08;
  }
  
  // Visual neon trailing spark trails
  if (Math.abs(sandboxP.vx) > 50 && P.onG) {
    if (Math.random() < 0.35) {
      const p = fxPool.get();
      p.x = P.x - camX + Math.random() * P.w;
      p.y = gy - 3;
      p.vx = -sandboxP.vx * 0.3 + (Math.random() - 0.5) * 60;
      p.vy = -30 - Math.random() * 80;
      p.s = 1.5 + Math.random() * 2.5;
      p.a = 1.0;
      p.l = 0.35 + Math.random() * 0.2;
      p.c = Math.random() < 0.5 ? mp.myColors.c1 : mp.myColors.c2;
      
      trail.push({ x: P.x + P.w / 2, y: P.y + P.h / 2, a: 1.0 });
    }
  }
  
  if (trail.length > 25) trail.shift();
  for (let i = trail.length - 1; i >= 0; i--) {
    trail[i].a -= dt * 2.5;
    if (trail[i].a <= 0) trail.splice(i, 1);
  }
  
  // Remote players interpolation
  for (const id in mp.players) {
    const r = mp.players[id];
    if (r.rx !== undefined) {
      r.rx += (r.x - r.rx) * (1 - Math.exp(-20 * dt));
      r.ry += (r.y - r.ry) * (1 - Math.exp(-20 * dt));
    }
  }
  
  updPart(dt);
  
  // Publish positional packets at throttled 100ms rate
  const now = Date.now();
  if (now - mp.lastPublishTime >= 100) {
    mp.lastPublishTime = now;
    publishPosition();
  }
}

function drawChatBubble(ctx, text, x, y, color, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 12px "Segoe UI", sans-serif';
  let displayText = text;
  if (displayText.length > 35) {
    displayText = displayText.substring(0, 32) + '...';
  }
  const textWidth = ctx.measureText(displayText).width;
  const paddingX = 8;
  const paddingY = 6;
  const boxW = textWidth + paddingX * 2;
  const boxH = 12 + paddingY * 2;
  
  ctx.translate(x, y);
  
  // Draw bubble background
  ctx.fillStyle = 'rgba(15, 5, 30, 0.85)';
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;
  
  ctx.beginPath();
  ctx.roundRect(-boxW / 2, -boxH, boxW, boxH, 8);
  ctx.fill();
  ctx.stroke();
  
  // Draw small tail
  ctx.beginPath();
  ctx.moveTo(-5, 0);
  ctx.lineTo(5, 0);
  ctx.lineTo(0, 5);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  // Draw text
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(displayText, 0, -boxH / 2);
  
  ctx.restore();
}

function drawRemotePlayers() {
  if (state !== 'multiplayerSandbox') return;
  ctx.save();
  for (const id in mp.players) {
    const r = mp.players[id];
    if (r.rx === undefined) {
      r.rx = r.x;
      r.ry = r.y;
    }
    
    ctx.save();
    ctx.globalAlpha = 0.65;
    ctx.translate(r.rx - camX + P.w / 2, r.ry + P.h / 2);
    ctx.rotate(r.rot || 0);
    
    const c1 = r.color1 || '#d946ef';
    const c2 = r.color2 || '#00c9ff';
    const grad = ctx.createLinearGradient(-P.w/2, -P.h/2, P.w/2, P.h/2);
    grad.addColorStop(0, c1);
    grad.addColorStop(1, c2);
    ctx.fillStyle = grad;
    
    ctx.beginPath();
    ctx.roundRect(-P.w/2, -P.h/2, P.w, P.h, 6);
    ctx.fill();
    
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = c1;
    ctx.shadowBlur = 8;
    ctx.stroke();
    
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    if (r.sliding) {
      ctx.fillRect(-10, -4, 5, 2);
      ctx.fillRect(5, -4, 5, 2);
    } else {
      ctx.fillRect(-11, -8, 5, 5);
      ctx.fillRect(6, -8, 5, 5);
    }
    ctx.restore();
    
    ctx.save();
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = c1;
    ctx.shadowBlur = 6;
    ctx.font = 'bold 11px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    
    let px = r.rx - camX + P.w / 2;
    let py = r.ry - 8;
    ctx.fillText(r.nickname || 'Joueur', px, py);
    
    if (r.chatMsg) {
      let timeLeft = r.chatMsg.expires - Date.now();
      if (timeLeft > 0) {
        let alpha = timeLeft < 500 ? timeLeft / 500 : 1;
        drawChatBubble(ctx, r.chatMsg.text, px, py - 14, c1, alpha);
      }
    }
    
    ctx.restore();
    
    // Draw off-screen indicator if player is outside the camera view
    if (px < -20 || px > W() + 20) {
      ctx.save();
      let isLeft = px < 0;
      let indX = isLeft ? 30 : W() - 30;
      let indY = r.ry + P.h/2;
      indY = Math.max(40, Math.min(H() - 40, indY));
      
      ctx.translate(indX, indY);
      
      // Triangle pointing left or right
      ctx.beginPath();
      if (isLeft) {
        ctx.moveTo(-10, 0); ctx.lineTo(10, -10); ctx.lineTo(10, 10);
      } else {
        ctx.moveTo(10, 0); ctx.lineTo(-10, -10); ctx.lineTo(-10, 10);
      }
      ctx.closePath();
      
      ctx.fillStyle = c1;
      ctx.fill();
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = '#ffffff';
      ctx.stroke();
      
      // Initials of nickname
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText((r.nickname || 'J').substring(0, 2).toUpperCase(), isLeft ? 22 : -22, 0);
      ctx.restore();
    }
    
  }
  ctx.restore();
}
